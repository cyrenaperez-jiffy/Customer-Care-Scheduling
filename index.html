// ── HELPERS ──
function getTimeOff(name,dateS,toData){return(toData||defaultTimeOff).find(r=>r.name===name&&dateRange(r.start,r.end).includes(dateS))||null;}
function hasDeparted(a,dateS){if(!a.lastDay)return false;const l=parseDate(a.lastDay),d=parseDate(dateS);return l&&d&&d>l;}
function hasNotStarted(a,dateS){if(!a.startDate)return false;const s=parseDate(a.startDate),d=parseDate(dateS);return s&&d&&d<s;}
function getCellStatus(agent,day,weekDates,toData){
  const dateS=weekDates[DAYS.indexOf(day)];const ea=getAgentForDate(agent,dateS);
  if(hasDeparted(agent,dateS))return{type:"departed",dateS,shift:ea.shift};
  if(hasNotStarted(agent,dateS))return{type:"notstarted",dateS,shift:ea.shift};
  if(!ea.workDays.includes(day))return{type:"dayoff",dateS,shift:ea.shift};
  const to=getTimeOff(agent.name,dateS,toData);
  if(to)return{type:to.half?"half":"pto",label:to.type,dateS,to,shift:ea.shift};
  return{type:ea.officeDays.includes(day)?"office":"wfh",dateS,shift:ea.shift};
}
function getStatus(a,refDate=REAL_TODAY){if(a.lastDay){const d=parseDate(a.lastDay);if(d&&d<refDate)return"departed";}if(a.startDate){const d=parseDate(a.startDate);if(d&&d>refDate)return"incoming";}return"active";}
function getActiveAgents(agents){return agents.filter(a=>{const st=getStatus(a);return st==="active"||st==="incoming";});}
function getWeekAgents(agents,week){const ws=parseDate(week.dates[0]),we=parseDate(week.dates[5]);return agents.filter(a=>{if(a.lastDay){const d=parseDate(a.lastDay);if(d&&d<ws)return false;}if(a.startDate){const d=parseDate(a.startDate);if(d&&d>we)return false;}return true;});}
function useSortableData(data,initialKey=null,initialDir="asc"){
  const[sortKey,setSortKey]=useState(initialKey);const[sortDir,setSortDir]=useState(initialDir);
  const sorted=useMemo(()=>{if(!sortKey)return data;return[...data].sort((a,b)=>{let av=a[sortKey],bv=b[sortKey];if(av instanceof Date){av=av.getTime();bv=(bv instanceof Date?bv:new Date(0)).getTime();}if(av==null)av="";if(bv==null)bv="";if(av<bv)return sortDir==="asc"?-1:1;if(av>bv)return sortDir==="asc"?1:-1;return 0;});},[data,sortKey,sortDir]);
  function requestSort(key){setSortDir(s=>sortKey===key?(s==="asc"?"desc":"asc"):"asc");setSortKey(key);}
  function SortTh({colKey,children,style={}}){const active=sortKey===colKey;return<th className={`sortable${active?" "+sortDir:""}`} onClick={()=>requestSort(colKey)} style={style}>{children}<span className="sort-icon"/></th>;}
  return{sorted,SortTh};
}
function agentToCode(a){const f=[`id:${a.id}`,`name:${JSON.stringify(a.name)}`,`shift:${JSON.stringify(a.shift)}`,`supervisor:${JSON.stringify(a.supervisor)}`,a.permanentSup?`permanentSup:${JSON.stringify(a.permanentSup)}`:null,`workDays:${JSON.stringify(a.workDays)}`,`officeDays:${JSON.stringify(a.officeDays)}`,`wfhDays:${JSON.stringify(a.wfhDays)}`,`isNew:${a.isNew}`,`startDate:${JSON.stringify(a.startDate||"")}`,a.lastDay?`lastDay:${JSON.stringify(a.lastDay)}`:null,`skills:${JSON.stringify(a.skills||"")}`,a.notes?`notes:${JSON.stringify(a.notes)}`:null].filter(Boolean);return`{${f.join(",")}}`;}
function timeOffToCode(r){const f=[`name:${JSON.stringify(r.name)}`,`type:${JSON.stringify(r.type)}`,`start:${JSON.stringify(r.start)}`,`end:${JSON.stringify(r.end)}`,`duration:${r.duration}`,`half:${r.half}`,r.note?`note:${JSON.stringify(r.note)}`:null].filter(Boolean);return`{${f.join(",")}}`;}
function buildAgentChangelog(type,n,o){const ts=new Date().toLocaleString();if(type==="agent_add")return{id:Date.now(),timestamp:ts,type,label:`➕ Added: ${n.name}`,instructions:`Add to defaultAgents:`,code:agentToCode(n)};if(type==="agent_remove")return{id:Date.now(),timestamp:ts,type,label:`🗑 Removed: ${o.name}`,instructions:`Delete id:${o.id} from defaultAgents`,code:`// DELETE:\n${agentToCode(o)}`};return{id:Date.now(),timestamp:ts,type,label:`✏️ Edited: ${n.name}`,instructions:`Replace id:${n.id} in defaultAgents:`,code:agentToCode(n)};}
function buildTimeOffChangelog(type,e){const ts=new Date().toLocaleString();if(type==="timeoff_add")return{id:Date.now(),timestamp:ts,type,label:`➕ Time off: ${e.name} ${e.type} (${e.start}–${e.end})`,instructions:`Add to defaultTimeOff:`,code:timeOffToCode(e)};return{id:Date.now(),timestamp:ts,type,label:`🗑 Removed: ${e.name} ${e.type} (${e.start})`,instructions:`Delete from defaultTimeOff:`,code:`// DELETE:\n${timeOffToCode(e)}`};}

// ── WEEK SELECTOR ──
function WeekSelector({weekIdx,setWeekIdx}){
  const past=WEEKS.filter((_,i)=>i<CURRENT_WEEK_IDX),cur=WEEKS.filter((_,i)=>i>=CURRENT_WEEK_IDX);
  return(<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16,alignItems:"center"}}>
    {past.length>0&&<select value={weekIdx<CURRENT_WEEK_IDX?weekIdx:""} onChange={e=>{if(e.target.value!=="")setWeekIdx(parseInt(e.target.value));}} style={{width:"auto",minWidth:180,fontWeight:600}}><option value="">📂 Past Weeks…</option>{past.map(w=>{const gi=WEEKS.indexOf(w);return<option key={gi} value={gi}>{w.month} {w.label} ({w.display})</option>;})}</select>}
    {cur.map(w=>{const gi=WEEKS.indexOf(w),isCur=gi===CURRENT_WEEK_IDX;return(<button key={gi} onClick={()=>setWeekIdx(gi)} className="btn" style={{background:weekIdx===gi?"#4f46e5":"#fff",color:weekIdx===gi?"#fff":"#475569",border:`2px solid ${weekIdx===gi?"#4f46e5":isCur?"#4f46e5":"#e2e8f0"}`,position:"relative"}}>{isCur&&<span style={{fontSize:8,position:"absolute",top:-6,left:"50%",transform:"translateX(-50%)",background:"#4f46e5",color:"#fff",padding:"1px 5px",borderRadius:6,whiteSpace:"nowrap"}}>THIS WEEK</span>}{w.label} <span style={{opacity:.7,fontSize:11}}>({w.display})</span></button>);})}
  </div>);
}

// ── CELL TAG ──
function CellTag({status}){
  if(status.type==="departed")return<span className="tag tag-departed">🚪</span>;
  if(status.type==="notstarted")return<span className="tag tag-incoming">⏳ N/A</span>;
  if(status.type==="dayoff")return<span className="tag tag-dayoff">—</span>;
  if(status.type==="office")return<span className="tag tag-office">🏢</span>;
  if(status.type==="wfh")return<span className="tag tag-wfh">🏠</span>;
  if(status.type==="half")return<span className="tag tag-half">½{status.to?.type==="Vacation"?" Vac":" Jiffy"}</span>;
  if(status.type==="pto"){if(status.to?.type==="Vacation")return<span className="tag tag-vacation">✈️</span>;if(status.to?.type==="Parental Leave")return<span className="tag tag-parental">👶</span>;if(status.to?.type==="Unpaid Leave")return<span className="tag" style={{background:"#f1f5f9",color:"#475569"}}>🔸UL</span>;return<span className="tag tag-jiffy">🌟</span>;}
  return<span className="tag tag-dayoff">—</span>;
}

// ── WORKABLE PDF PARSER ──
async function parseWorkablePDF(file){
  const buf=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:buf}).promise;let allText="";
  for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const tc=await page.getTextContent();allText+=tc.items.map(it=>it.str).join(" ")+"\n";}
  const dateRe=/(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{1,2},\s+\d{4}/g;
  const typeKW=["Jiffy Day","Vacation","Parental Leave","Unpaid Leave","Sick Leave","Bereavement"];
  const statusKW=["Approved","Canceled","Pending","Denied"];
  const lines=allText.replace(/\s+/g," ").split(/(?=\w+,\s\w)/);const entries=[];
  for(const line of lines){const dates=[...line.matchAll(dateRe)].map(m=>m[0]);if(dates.length<2)continue;const status=statusKW.find(s=>line.includes(s));if(!status||status==="Canceled")continue;let toType=null;for(const kw of typeKW){if(line.indexOf(kw)!==-1){toType=kw;break;}}if(!toType)continue;const nm=line.match(/^([A-Za-zÀ-ÿ'-]+),\s*([A-Za-zÀ-ÿ'-]+)/);if(!nm)continue;const startD=new Date(dates[0]),endD=new Date(dates[1]);const dur=line.match(/([\d.]+)\s*Days?/);const fD=d=>`${d.getMonth()+1}/${d.getDate()}/${String(d.getFullYear()).slice(-2)}`;entries.push({lastName:nm[1].trim(),firstPart:nm[2].trim(),type:toType,start:fD(startD),end:fD(endD),duration:dur?parseFloat(dur[1]):1,half:dur&&parseFloat(dur[1])===0.5,status,_raw:line.slice(0,80)});}
  return entries;
}
function matchAgentName(ln,fp,agents){const lnL=ln.toLowerCase(),fpL=fp.toLowerCase();let best=null,bs=0;for(const a of agents){const p=a.name.split(" "),aF=p[0].toLowerCase(),aL=p.slice(1).join(" ").toLowerCase();if(!aL.startsWith(lnL.slice(0,3))&&lnL.slice(0,3)!==aL.slice(0,3))continue;let sc=0;if(aL===lnL)sc+=10;else if(aL.startsWith(lnL)||lnL.startsWith(aL))sc+=7;if(aF===fpL)sc+=10;else if(aF.startsWith(fpL)||fpL.startsWith(aF.slice(0,fpL.length)))sc+=6;if(sc>bs){bs=sc;best=a;}}return bs>=10?best:null;}

    <div style={{padding:"20px 24px",maxWidth:1300,margin:"0 auto"}}>

    {showExport&&<ExportModal log={changeLog} onClose={()=>setShowExport(false)} onClear={()=>setChangeLog([])}/>}
  </div>);
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>

function getTimeOff(name,dateS,toData){return(toData||defaultTimeOff).find(r=>r.name===name&&dateRange(r.start,r.end).includes(dateS))||null;}
function hasDeparted(a,dateS){if(!a.lastDay)return false;const l=parseDate(a.lastDay),d=parseDate(dateS);return l&&d&&d>l;}

function CellTag({status}){

  if(status.type==="notstarted")return<span className="tag tag-incoming">⏳ N/A</span>;
  if(status.type==="dayoff")return<span className="tag tag-dayoff">—</span>;
  if(status.type==="office")return<span className="tag tag-office">🏢</span>;
  if(status.type==="wfh")return<span className="tag tag-wfh">🏠</span>;
  if(status.type==="half")return<span className="tag tag-half">½{status.to?.type==="Vacation"?" Vac":" Jiffy"}</span>;
  if(status.type==="pto"){if(status.to?.type==="Vacation")return<span className="tag tag-vacation">✈️</span>;if(status.to?.type==="Parental Leave")return<span className="tag tag-parental">👶</span>;if(status.to?.type==="Unpaid Leave")return<span className="tag" style={{background:"#f1f5f9",color:"#475569"}}>🔸UL</span>;return<span className="tag tag-jiffy">🌟</span>;}

}

// ── WORKABLE PDF PARSER ──
async function parseWorkablePDF(file){
  const buf=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:buf}).promise;let allText="";
  for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const tc=await page.getTextContent();allText+=tc.items.map(it=>it.str).join(" ")+"\n";}
  const dateRe=/(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{1,2},\s+\d{4}/g;
  const typeKW=["Jiffy Day","Vacation","Parental Leave","Unpaid Leave","Sick Leave","Bereavement"];
  const statusKW=["Approved","Canceled","Pending","Denied"];
  const lines=allText.replace(/\s+/g," ").split(/(?=\w+,\s\w)/);const entries=[];
  for(const line of lines){const dates=[...line.matchAll(dateRe)].map(m=>m[0]);if(dates.length<2)continue;const status=statusKW.find(s=>line.includes(s));if(!status||status==="Canceled")continue;let toType=null;for(const kw of typeKW){if(line.indexOf(kw)!==-1){toType=kw;break;}}if(!toType)continue;const nm=line.match(/^([A-Za-zÀ-ÿ'-]+),\s*([A-Za-zÀ-ÿ'-]+)/);if(!nm)continue;const startD=new Date(dates[0]),endD=new Date(dates[1]);const dur=line.match(/([\d.]+)\s*Days?/);const fD=d=>`${d.getMonth()+1}/${d.getDate()}/${String(d.getFullYear()).slice(-2)}`;entries.push({lastName:nm[1].trim(),firstPart:nm[2].trim(),type:toType,start:fD(startD),end:fD(endD),duration:dur?parseFloat(dur[1]):1,half:dur&&parseFloat(dur[1])===0.5,status,_raw:line.slice(0,80)});}
  return entries;
}
function matchAgentName(ln,fp,agents){const lnL=ln.toLowerCase(),fpL=fp.toLowerCase();let best=null,bs=0;for(const a of agents){const p=a.name.split(" "),aF=p[0].toLowerCase(),aL=p.slice(1).join(" ").toLowerCase();if(!aL.startsWith(lnL.slice(0,3))&&lnL.slice(0,3)!==aL.slice(0,3))continue;let sc=0;if(aL===lnL)sc+=10;else if(aL.startsWith(lnL)||lnL.startsWith(aL))sc+=7;if(aF===fpL)sc+=10;else if(aF.startsWith(fpL)||fpL.startsWith(aF.slice(0,fpL.length)))sc+=6;if(sc>bs){bs=sc;best=a;}}return bs>=10?best:null;}

      <div style={{display:"flex",gap:8,justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:"#64748b"}}>{selCount} selected</span><div style={{display:"flex",gap:8}}><button className="btn btn-ghost" onClick={()=>setParsed(null)}>← Back</button><button className="btn btn-ghost" onClick={onClose}>Cancel</button><button className="btn btn-success" disabled={selCount===0} onClick={handleImport} style={{opacity:selCount>0?1:0.5}}>Import {selCount}</button></div></div>

  </div></div>);
}

// ── TODAY TAB ──
function TodayTab({agents,timeOffData}){
  const wk=WEEKS.find(w=>w.dates.includes(TODAY_STR))||WEEKS[CURRENT_WEEK_IDX];const wd=wk.dates;const active=getActiveAgents(agents);
  const working=[],pto=[],halfDay=[],wfh=[],inOffice=[];
  active.forEach(a=>{const s=getCellStatus(a,TODAY_DAY,wd,timeOffData);if(s.type==="dayoff"||s.type==="departed"||s.type==="notstarted")return;if(s.type==="pto"){pto.push({agent:a,to:s.to});return;}if(s.type==="half"){halfDay.push({agent:a,to:s.to});return;}if(s.type==="office"){inOffice.push(a);working.push(a);}if(s.type==="wfh"){wfh.push(a);working.push(a);}});

  const expected=active.filter(a=>a.workDays.includes(TODAY_DAY)&&!hasNotStarted(a,TODAY_STR)).length;const actual=working.length+halfDay.length;const pct=expected>0?Math.round(actual/expected*100):100;const risk=pct<70?"HIGH":pct<85?"MEDIUM":"OK";
  const starting7=agents.filter(a=>{if(!a.startDate)return false;const sd=parseDate(a.startDate);const diff=(sd-REAL_TODAY)/(1000*60*60*24);return diff>=0&&diff<=7;});

    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:24}}>{[["👥","Working",working.length,`+${halfDay.length} half`,""],["🏢","In Office",inOffice.length,"","ok-card"],["🏠","WFH",wfh.length,"",""],["🌟","Out/PTO",pto.length,"",pto.length>3?"risk-card":""]].map(([icon,label,val,sub,cls])=><div key={label} className={`card ${cls}`} style={{textAlign:"center",padding:"16px 10px"}}><div style={{fontSize:22}}>{icon}</div><div style={{fontSize:28,fontWeight:800,color:"#1e293b",margin:"4px 0"}}>{val}</div><div style={{fontSize:12,fontWeight:700,color:"#475569"}}>{label}</div>{sub&&<div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{sub}</div>}</div>)}</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:24}}>
      <div className="card"><div style={{fontWeight:700,fontSize:14,marginBottom:12}}>🌟 Out Today</div>{pto.length===0&&halfDay.length===0?<p style={{fontSize:12,color:"#94a3b8"}}>No time off ✓</p>:[...pto,...halfDay].map((item,i)=>{const c=SUP_COLORS[item.agent.supervisor]||{bg:"#64748b"};return(<div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #f1f5f9"}}><div><div style={{fontWeight:600,fontSize:12}}>{item.agent.name}</div><div style={{fontSize:11,color:c.bg}}>{item.agent.supervisor}</div></div><div>{item.to?.half?<span className="tag tag-half">½</span>:item.to?.type==="Vacation"?<span className="tag tag-vacation">✈️</span>:item.to?.type==="Parental Leave"?<span className="tag tag-parental">👶</span>:<span className="tag tag-jiffy">🌟</span>}</div></div>);})}</div>
      <div className="card"><div style={{fontWeight:700,fontSize:14,marginBottom:12}}>🏢 In Office ({sortedIO.length})</div>{sortedIO.length===0?<p style={{fontSize:12,color:"#94a3b8"}}>No in-office agents</p>:sortedIO.map((a,i)=>{const ea=getAgentForDate(a,TODAY_STR);const c=SUP_COLORS[a.supervisor]||{bg:"#64748b"};return(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #f1f5f9"}}><div style={{fontWeight:600,fontSize:12}}>{a.name}</div><div style={{fontSize:11,color:c.bg}}>{ea.shift}</div></div>);})}</div>
    </div>
    <div className="card"><div style={{fontWeight:700,fontSize:13}}>⚠️ Risks & Alerts</div><div style={{marginTop:10,display:"flex",flexDirection:"column",gap:8}}>{risk!=="OK"&&<div style={{background:"#fff5f5",border:"1px solid #fca5a5",borderRadius:8,padding:"8px 10px",fontSize:12}}><strong style={{color:"#991b1b"}}>{risk==="HIGH"?"🔴 Staffing Risk":"🟡 Coverage Watch"}</strong><p style={{color:"#475569",marginTop:2}}>Headcount ({working.length}) is {100-pct}% below expected ({expected}).</p></div>}{starting7.length>0&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"8px 10px",fontSize:12}}><strong style={{color:"#166534"}}>✨ Starting This Week</strong>{starting7.map(a=><div key={a.id} style={{fontSize:11,marginTop:3}}>{a.name} — {fmtFull(a.startDate)}</div>)}</div>}{risk==="OK"&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"8px 10px",fontSize:12,color:"#166534",fontWeight:600}}>✅ All Clear</div>}</div></div>

// ── OVERVIEW TAB ──
function OverviewTab({agents,timeOffData}){
  const[weekIdx,setWeekIdx]=useState(CURRENT_WEEK_IDX);const[view,setView]=useState("all");const[dayFilter,setDayFilter]=useState("Monday");
  const week=WEEKS[weekIdx];const wA=getWeekAgents(agents,week);
  function buildData(){return INTERVALS.map(({label,minutes})=>{const row={label};DAYS.forEach(day=>{let total=0,office=0;wA.forEach(a=>{const dateS=week.dates[DAYS.indexOf(day)];const ea=getAgentForDate(a,dateS);const st=getCellStatus(a,day,week.dates,timeOffData);if(st.type==="dayoff"||st.type==="pto"||st.type==="departed"||st.type==="notstarted")return;const sh=SHIFT_TIMES[ea.shift];if(!sh)return;if(minutes>=sh.start&&minutes<sh.end){total++;if(st.type==="office")office++;}});row[day]={total,office};});return row;});}
  const data=buildData();const maxT=Math.max(...data.map(r=>DAYS.reduce((m,d)=>Math.max(m,r[d].total),0)));
  const tBg=(n,max)=>{if(!n)return"#f8fafc";const p=n/max;return p<0.3?"#dbeafe":p<0.6?"#93c5fd":p<0.85?"#3b82f6":"#1d4ed8";};
  const oBg=n=>{if(!n)return"#f8fafc";if(n>OFFICE_SEAT_LIMIT)return"#fee2e2";if(n>OFFICE_SEAT_LIMIT-3)return"#fef3c7";const p=n/OFFICE_SEAT_LIMIT;return p<0.5?"#dcfce7":p<0.8?"#86efac":"#22c55e";};
  const oTc=n=>{if(!n)return"#1e293b";if(n>OFFICE_SEAT_LIMIT)return"#991b1b";if(n>OFFICE_SEAT_LIMIT-3)return"#92400e";return n/OFFICE_SEAT_LIMIT>0.7?"#fff":"#1e293b";};
  const tc=bg=>["#3b82f6","#1d4ed8","#22c55e","#15803d"].includes(bg)?"#fff":"#1e293b";
  const offRisk=DAYS.map(day=>({day,peak:Math.max(...data.map(r=>r[day].office))})).filter(x=>x.peak>OFFICE_SEAT_LIMIT);
  return(<div>
    <WeekSelector weekIdx={weekIdx} setWeekIdx={setWeekIdx}/>
    {offRisk.length>0&&<div className="card risk-card" style={{marginBottom:16}}><div style={{fontWeight:700,fontSize:13,marginBottom:6}}>🏢 Office Capacity Risk — {OFFICE_SEAT_LIMIT} seats</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{offRisk.map(x=><span key={x.day} style={{background:"#fee2e2",color:"#991b1b",padding:"3px 10px",borderRadius:12,fontSize:12,fontWeight:700}}>{x.day}: {x.peak}</span>)}</div></div>}
    <div style={{display:"flex",gap:8,marginBottom:16}}>{[["all","📊 All Days"],["single","📅 Single Day"]].map(([v,l])=><button key={v} onClick={()=>setView(v)} className="btn" style={{background:view===v?"#4f46e5":"#fff",color:view===v?"#fff":"#475569",border:`1px solid ${view===v?"#4f46e5":"#e2e8f0"}`}}>{l}</button>)}{view==="single"&&<select value={dayFilter} onChange={e=>setDayFilter(e.target.value)} style={{width:"auto",minWidth:120}}>{DAYS.map(d=><option key={d}>{d}</option>)}</select>}</div>
    {view==="all"&&<><div style={{marginBottom:20}}><div style={{fontWeight:700,fontSize:14,marginBottom:8}}>👥 Total Staffed</div><div style={{overflowX:"auto",borderRadius:12,border:"1px solid #e2e8f0"}}><table style={{minWidth:700}}><thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}><th style={{minWidth:70,position:"sticky",left:0,background:"#f8fafc",zIndex:2}}>Time</th>{DAYS.map((d,i)=><th key={d} style={{textAlign:"center",minWidth:70}}><div>{d.slice(0,3)}</div><div style={{fontWeight:400,fontSize:10,color:"#94a3b8"}}>{fmtShort(week.dates[i])}</div></th>)}</tr></thead><tbody>{data.map((row,ri)=><tr key={ri} style={{borderBottom:"1px solid #f1f5f9"}}><td style={{fontWeight:600,fontSize:11,color:"#475569",position:"sticky",left:0,background:"#fff",zIndex:1}}>{row.label}</td>{DAYS.map(day=>{const n=row[day].total,bg=tBg(n,maxT);return<td key={day} style={{textAlign:"center",background:bg,color:tc(bg),fontWeight:700,fontSize:13,padding:"5px 4px"}}>{n>0?n:"–"}</td>;})}</tr>)}</tbody></table></div></div>
    <div><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><div style={{fontWeight:700,fontSize:14}}>🏢 In Office</div><span style={{fontSize:11,background:"#fee2e2",color:"#991b1b",padding:"2px 8px",borderRadius:8,fontWeight:600}}>🔴 over {OFFICE_SEAT_LIMIT}</span><span style={{fontSize:11,background:"#fef3c7",color:"#92400e",padding:"2px 8px",borderRadius:8,fontWeight:600}}>🟡 within 3</span></div><div style={{overflowX:"auto",borderRadius:12,border:"1px solid #e2e8f0"}}><table style={{minWidth:700}}><thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}><th style={{minWidth:70,position:"sticky",left:0,background:"#f8fafc",zIndex:2}}>Time</th>{DAYS.map((d,i)=><th key={d} style={{textAlign:"center",minWidth:70}}><div>{d.slice(0,3)}</div><div style={{fontWeight:400,fontSize:10,color:"#94a3b8"}}>{fmtShort(week.dates[i])}</div></th>)}</tr></thead><tbody>{data.map((row,ri)=><tr key={ri} style={{borderBottom:"1px solid #f1f5f9"}}><td style={{fontWeight:600,fontSize:11,color:"#475569",position:"sticky",left:0,background:"#fff",zIndex:1}}>{row.label}</td>{DAYS.map(day=>{const n=row[day].office,bg=oBg(n),color=oTc(n);return<td key={day} style={{textAlign:"center",background:bg,color,fontWeight:700,fontSize:13,padding:"5px 4px"}}>{n>0?n:"–"}{n>OFFICE_SEAT_LIMIT?" ⚠️":""}</td>;})}</tr>)}</tbody></table></div></div></>}
    {view==="single"&&(()=>{const sd=data.map(r=>({label:r.label,total:r[dayFilter].total,office:r[dayFilter].office}));const ms=Math.max(...sd.map(r=>r.total));return(<div style={{borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden",background:"#fff"}}><table><thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}><th>Time</th><th>Staffed</th><th style={{width:80,textAlign:"center"}}>Total</th><th style={{width:80,textAlign:"center"}}>Office</th></tr></thead><tbody>{sd.map((row,i)=>{const pT=ms>0?row.total/ms:0,pO=row.total>0?row.office/row.total:0,over=row.office>OFFICE_SEAT_LIMIT;return(<tr key={i} style={{borderBottom:"1px solid #f8fafc",background:over?"#fff5f5":""}}><td style={{fontWeight:600,fontSize:11,color:"#475569"}}>{row.label}</td><td style={{padding:"4px 8px"}}><div style={{position:"relative",height:18,background:"#f1f5f9",borderRadius:3,overflow:"hidden"}}><div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pT*100}%`,background:"#93c5fd",borderRadius:3}}/><div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pT*pO*100}%`,background:over?"#ef4444":"#22c55e",borderRadius:3}}/></div></td><td style={{textAlign:"center",fontWeight:700,color:row.total>0?"#1d4ed8":"#cbd5e1"}}>{row.total||"–"}</td><td style={{textAlign:"center",fontWeight:700,color:over?"#991b1b":row.office>0?"#15803d":"#cbd5e1"}}>{row.office||"–"}{over?" ⚠️":""}</td></tr>);})}</tbody></table></div>);})()}
  </div>);
}

    <div style={{display:"flex",gap:10,marginBottom:14,alignItems:"center"}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search…" style={{maxWidth:220}}/>{isManager&&<button className="btn btn-success" style={{marginLeft:"auto"}} onClick={()=>setEditAgent({workDays:[],officeDays:[],wfhDays:[],shift:"6:00–2:30",supervisor:"Shelby Coldiron",isNew:true,skills:"",startDate:"",lastDay:""})}>+ Add Agent</button>}</div>

    <tbody>{sorted.length===0&&<tr><td colSpan={11} style={{textAlign:"center",color:"#94a3b8",padding:24}}>No agents</td></tr>}{sorted.map(agent=>{const hasPto=DAYS.some(d=>{const s=getCellStatus(agent,d,week.dates,timeOffData);return s.type==="pto"||s.type==="half";});const ea=getAgentForDate(agent,week.dates[1]);const c=SUP_COLORS[agent.supervisor]||{bg:"#64748b"};return(<tr key={agent.id} style={{borderBottom:"1px solid #f1f5f9",background:hasPto?"#fffbeb":agent.isNew?"#f0fdf4":"#fff"}}><td style={{fontWeight:600,position:"sticky",left:0,background:"inherit",zIndex:1}}>{agent.isNew&&<span style={{marginRight:4}}>✨</span>}{agent.name}</td><td style={{fontSize:11,color:"#64748b"}}>{ea.shift}</td><td><span style={{fontSize:11,fontWeight:600,color:c.bg}}>{agent.supervisor}</span></td>{DAYS.map(day=>{const st=getCellStatus(agent,day,week.dates,timeOffData);return<td key={day} style={{textAlign:"center",padding:"6px 4px"}}><CellTag status={st}/></td>;})}{isManager&&<td style={{textAlign:"center"}}><button className="btn btn-ghost" style={{fontSize:11,padding:"3px 8px",marginRight:4}} onClick={()=>setEditAgent(agent)}>✏️</button><button className="btn btn-danger" style={{fontSize:11,padding:"3px 8px"}} onClick={()=>setDelConfirm(agent.id)}>🗑</button></td>}</tr>);})}</tbody></table></div></div>
    <p style={{fontSize:11,color:"#94a3b8",marginTop:6}}>{sorted.length} agents</p>
    {editAgent&&<RosterEditModal agent={editAgent} onSave={form=>{if(form.id){const old=agents.find(a=>a.id===form.id);persist(agents.map(a=>a.id===form.id?form:a),buildAgentChangelog("agent_edit",form,old));}else{const n={...form,id:Math.max(0,...agents.map(a=>a.id))+1};persist([...agents,n],buildAgentChangelog("agent_add",n,null));}setEditAgent(null);}} onClose={()=>setEditAgent(null)}/>}
    {delConfirm&&<div className="modal-overlay" onClick={()=>setDelConfirm(null)}><div className="modal" style={{width:340}} onClick={e=>e.stopPropagation()}><h2 style={{fontWeight:700,fontSize:16,marginBottom:8}}>Remove Agent?</h2><p style={{fontSize:13,color:"#64748b",marginBottom:20}}>Remove <strong>{agents.find(a=>a.id===delConfirm)?.name}</strong>?</p><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button className="btn btn-ghost" onClick={()=>setDelConfirm(null)}>Cancel</button><button className="btn btn-danger" onClick={()=>{const rm=agents.find(a=>a.id===delConfirm);persist(agents.filter(a=>a.id!==delConfirm),buildAgentChangelog("agent_remove",null,rm));setDelConfirm(null);}}>Remove</button></div></div></div>}
  </div>);
}

// ── ROSTER TAB ──
function RosterTab({agents,setAgents,onChangeLogged}){
  const[search,setSearch]=useState("");const[filterSup,setFilterSup]=useState("All");const[filterStatus,setFilterStatus]=useState("active");const[editAgent,setEditAgent]=useState(null);const[saved,setSaved]=useState(false);
  const persist=(a,log)=>{setAgents(a);if(log)onChangeLogged(log);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const enriched=useMemo(()=>agents.map(a=>({...a,_status:getStatus(a),_tenure:tenure(a.startDate)})),[agents]);
  const filtered=enriched.filter(a=>(filterSup==="All"||a.supervisor===filterSup)&&(filterStatus==="All"||a._status===filterStatus)&&(!search||a.name.toLowerCase().includes(search.toLowerCase())||(a.skills||"").toLowerCase().includes(search.toLowerCase())));
  const{sorted,SortTh}=useSortableData(filtered,"name");
  const counts={active:0,incoming:0,departed:0};enriched.forEach(a=>{if(counts[a._status]!==undefined)counts[a._status]++;});
  return(<div>
    {saved&&<div style={{background:"#dcfce7",color:"#166534",padding:"8px 14px",borderRadius:8,marginBottom:12,fontSize:12,fontWeight:600}}>✓ Saved</div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>{[["Total","All","#4f46e5",counts.active+counts.incoming+counts.departed],["Active","active","#059669",counts.active],["Incoming","incoming","#7c3aed",counts.incoming],["Departed","departed","#ef4444",counts.departed]].map(([label,val,color,count])=><div key={label} onClick={()=>setFilterStatus(val)} style={{background:filterStatus===val?color+"15":"#fff",border:`2px solid ${filterStatus===val?color:"#e2e8f0"}`,borderRadius:12,padding:"14px",cursor:"pointer"}}><div style={{fontSize:11,fontWeight:700,color,marginBottom:2,textTransform:"uppercase"}}>{label}</div><div style={{fontSize:28,fontWeight:800}}>{count}</div></div>)}</div>
    <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search…" style={{maxWidth:240}}/><select value={filterSup} onChange={e=>setFilterSup(e.target.value)} style={{width:"auto",minWidth:160}}><option value="All">All Supervisors</option>{SUPERVISORS.map(s=><option key={s}>{s}</option>)}</select><button className="btn btn-success" style={{marginLeft:"auto"}} onClick={()=>setEditAgent({workDays:[],officeDays:[],wfhDays:[],shift:"6:00–2:30",supervisor:"Shelby Coldiron",isNew:true,skills:"",startDate:"",lastDay:""})}>+ Add</button></div>
    <div style={{borderRadius:12,overflow:"hidden",border:"1px solid #e2e8f0"}}><div style={{overflowX:"auto"}}><table><thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}><SortTh colKey="name" style={{minWidth:170}}>Agent</SortTh><SortTh colKey="_status" style={{minWidth:90}}>Status</SortTh><SortTh colKey="supervisor" style={{minWidth:140}}>Supervisor</SortTh><SortTh colKey="shift" style={{minWidth:90}}>Shift</SortTh><SortTh colKey="startDate" style={{minWidth:90}}>Start</SortTh><SortTh colKey="_tenure" style={{minWidth:70}}>Tenure</SortTh><th style={{minWidth:230}}>Skills</th><th style={{minWidth:60,textAlign:"center"}}>Edit</th></tr></thead>
    <tbody>{sorted.map(a=>{const c=SUP_COLORS[a.supervisor]||{bg:"#64748b"};const skills=(a.skills||"").split(",").map(s=>s.trim()).filter(Boolean);return(<tr key={a.id} style={{borderBottom:"1px solid #f1f5f9",background:a._status==="departed"?"#fff5f5":a._status==="incoming"?"#f5f3ff":a.isNew?"#f0fdf4":"#fff"}}><td style={{fontWeight:600}}>{a.isNew&&<span style={{marginRight:4}}>✨</span>}{a.name}</td><td>{a._status==="active"?<span className="tag tag-active">● Active</span>:a._status==="incoming"?<span className="tag tag-incoming">⏳ Incoming</span>:<span className="tag tag-departed">🚪 Departed</span>}</td><td><span style={{fontSize:11,fontWeight:600,color:c.bg}}>{a.supervisor}</span></td><td style={{fontSize:11,color:"#64748b"}}>{a.shift}</td><td style={{fontSize:11,color:"#475569"}}>{a.startDate?fmtShort(a.startDate):"—"}</td><td style={{fontSize:11,color:"#64748b"}}>{a._tenure}</td><td>{skills.length>0?skills.map((sk,i)=><span key={i} className="skill-chip">{sk}</span>):<span style={{fontSize:11,color:"#94a3b8"}}>—</span>}</td><td style={{textAlign:"center"}}><button className="btn btn-ghost" style={{fontSize:11,padding:"3px 8px"}} onClick={()=>setEditAgent(a)}>✏️</button></td></tr>);})}</tbody></table></div></div>
    {editAgent&&<RosterEditModal agent={editAgent} onSave={form=>{if(form.id){const old=agents.find(a=>a.id===form.id);persist(agents.map(a=>a.id===form.id?form:a),buildAgentChangelog("agent_edit",form,old));}else{const n={...form,id:Math.max(0,...agents.map(a=>a.id))+1};persist([...agents,n],buildAgentChangelog("agent_add",n,null));}setEditAgent(null);}} onClose={()=>setEditAgent(null)}/>}
  </div>);
}

// ── TIME OFF TAB ──
function TimeOffTab({agents,timeOffData,setTimeOffData,isManager,onChangeLogged}){
  const[mf,setMf]=useState("All");const[nf,setNf]=useState("All");const[supf,setSupf]=useState("All");const[search,setSearch]=useState("");const[addModal,setAddModal]=useState(false);const[delConfirm,setDelConfirm]=useState(null);const[saved,setSaved]=useState(false);const[uploadModal,setUploadModal]=useState(false);
  const persist=(d,log)=>{setTimeOffData(d);if(log)onChangeLogged(log);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const names=["All",...[...new Set(timeOffData.map(r=>r.name))].sort()];
  function getMonth(r){const d=parseDate(r.start);if(!d)return"Other";return["January","February","March","April","May","June","July"][d.getMonth()]||"Other";}
  const enriched=timeOffData.map(r=>{const agent=agents.find(a=>a.name===r.name);return{...r,_sup:agent?.supervisor||"—",_month:getMonth(r),_startDate:parseDate(r.start)||new Date(0)};});
  const filtered=enriched.filter(r=>(mf==="All"||r._month===mf)&&(nf==="All"||r.name===nf)&&(supf==="All"||r._sup===supf)&&(!search||r.name.toLowerCase().includes(search.toLowerCase())||r.type.toLowerCase().includes(search.toLowerCase())));
  const{sorted,SortTh}=useSortableData(filtered,"_startDate");
  const months=["February","March","April","May","June"];const mc={};months.forEach(m=>{mc[m]=[...new Set(timeOffData.filter(r=>getMonth(r)===m).map(r=>r.name))].length;});
  const activeNames=[...new Set(getActiveAgents(agents).map(a=>a.name))].sort();
  return(<div>
    {saved&&<div style={{background:"#dcfce7",color:"#166534",padding:"8px 14px",borderRadius:8,marginBottom:12,fontSize:12,fontWeight:600}}>✓ Saved</div>}
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}><button onClick={()=>setMf("All")} className="btn" style={{background:mf==="All"?"#4f46e5":"#fff",color:mf==="All"?"#fff":"#475569",border:`2px solid ${mf==="All"?"#4f46e5":"#e2e8f0"}`}}>All Months</button>{months.filter(m=>mc[m]>0).map(m=><button key={m} onClick={()=>setMf(mf===m?"All":m)} className="btn" style={{background:mf===m?"#4f46e5":"#fff",color:mf===m?"#fff":"#475569",border:`2px solid ${mf===m?"#4f46e5":"#e2e8f0"}`}}>{m} ({mc[m]})</button>)}</div>
    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search…" style={{maxWidth:180}}/><select value={supf} onChange={e=>setSupf(e.target.value)} style={{width:"auto",minWidth:160}}><option value="All">All Supervisors</option>{SUPERVISORS.map(s=><option key={s} value={s}>{s}</option>)}</select><select value={nf} onChange={e=>setNf(e.target.value)} style={{width:"auto",minWidth:160}}>{names.map(n=><option key={n}>{n}</option>)}</select><button className="btn btn-ghost" onClick={()=>{setMf("All");setNf("All");setSupf("All");setSearch("");}}>Clear</button><div style={{marginLeft:"auto",display:"flex",gap:8}}><button className="btn btn-export" onClick={()=>setUploadModal(true)}>📄 Upload Workable PDF</button>{isManager&&<button className="btn btn-success" onClick={()=>setAddModal(true)}>+ Add Time Off</button>}</div></div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}><span onClick={()=>setSupf("All")} style={{cursor:"pointer",background:supf==="All"?"#1e293b":"#f1f5f9",color:supf==="All"?"#fff":"#475569",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,border:`1px solid ${supf==="All"?"#1e293b":"#e2e8f0"}`}}>All</span>{SUPERVISORS.map(s=>{const c=SUP_COLORS[s]||{bg:"#64748b",light:"#f8fafc"};const sel=supf===s;const cnt=enriched.filter(r=>r._sup===s).length;if(!cnt)return null;return<span key={s} onClick={()=>setSupf(sel?"All":s)} style={{cursor:"pointer",background:sel?c.bg:c.light,color:sel?"#fff":c.bg,padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,border:`1px solid ${sel?c.bg:"#e2e8f0"}`}}>{s} ({cnt})</span>;})}</div>
    <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}><span className="tag tag-vacation">✈️ Vacation</span><span className="tag tag-jiffy">🌟 Jiffy</span><span className="tag tag-half">½ Half</span><span className="tag tag-parental">👶 Parental</span><span className="tag" style={{background:"#f1f5f9",color:"#475569"}}>🔸 Unpaid</span></div>
    <div style={{borderRadius:12,overflow:"hidden",border:"1px solid #e2e8f0"}}><table><thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}><SortTh colKey="name" style={{minWidth:160}}>Agent</SortTh><SortTh colKey="type">Type</SortTh><SortTh colKey="_startDate">Dates</SortTh><SortTh colKey="duration" style={{textAlign:"center"}}>Days</SortTh><th>Status</th><SortTh colKey="_sup">Supervisor</SortTh>{isManager&&<th style={{textAlign:"center",minWidth:60}}>Del</th>}</tr></thead>
    <tbody>{sorted.length===0&&<tr><td colSpan={7} style={{textAlign:"center",color:"#94a3b8",padding:24}}>No records</td></tr>}{sorted.map((r,i)=>{const c=SUP_COLORS[r._sup]||{bg:"#64748b"};return(<tr key={i} style={{borderBottom:"1px solid #f1f5f9",background:r.note?"#fffbeb":"#fff"}}><td style={{fontWeight:600}}>{r.name}</td><td>{r.half?<span className="tag tag-half">½ {r.type}</span>:r.type==="Vacation"?<span className="tag tag-vacation">✈️</span>:r.type==="Parental Leave"?<span className="tag tag-parental">👶</span>:r.type==="Unpaid Leave"?<span className="tag" style={{background:"#f1f5f9",color:"#475569"}}>🔸</span>:<span className="tag tag-jiffy">🌟</span>}</td><td style={{color:"#475569",whiteSpace:"nowrap"}}>{r.start===r.end?fmtShort(r.start):`${fmtShort(r.start)}–${fmtShort(r.end)}`}</td><td style={{textAlign:"center",color:"#64748b"}}>{r.duration}</td><td><span style={{fontSize:11,color:r.note?"#854d0e":"#059669",fontWeight:600}}>{r.note||"Approved"}</span></td><td><span style={{fontSize:11,fontWeight:600,color:c.bg}}>{r._sup}</span></td>{isManager&&<td style={{textAlign:"center"}}><button className="btn btn-danger" style={{fontSize:11,padding:"2px 7px"}} onClick={()=>setDelConfirm(i)}>🗑</button></td>}</tr>);})}</tbody></table></div>
    <p style={{fontSize:11,color:"#94a3b8",marginTop:6}}>{sorted.length} of {timeOffData.length} shown.</p>
    {addModal&&<TimeOffEditModal agentNames={activeNames} onSave={entry=>{persist([...timeOffData,entry],buildTimeOffChangelog("timeoff_add",entry));setAddModal(false);}} onClose={()=>setAddModal(false)}/>}
    {uploadModal&&<WorkableUploadModal agents={agents} existingTimeOff={timeOffData} onImport={entries=>{const nd=[...timeOffData,...entries];entries.forEach(e=>onChangeLogged(buildTimeOffChangelog("timeoff_add",e)));persist(nd);setUploadModal(false);}} onClose={()=>setUploadModal(false)}/>}
    {delConfirm!==null&&<div className="modal-overlay" onClick={()=>setDelConfirm(null)}><div className="modal" style={{width:340}} onClick={e=>e.stopPropagation()}><h2 style={{fontWeight:700,fontSize:16,marginBottom:8}}>Remove?</h2><p style={{fontSize:13,color:"#64748b",marginBottom:20}}>Remove <strong>{sorted[delConfirm]?.name}</strong> — {sorted[delConfirm]?.type} ({sorted[delConfirm]?.start})?</p><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button className="btn btn-ghost" onClick={()=>setDelConfirm(null)}>Cancel</button><button className="btn btn-danger" onClick={()=>{const rm=sorted[delConfirm];const nd=timeOffData.filter(r=>!(r.name===rm.name&&r.start===rm.start&&r.end===rm.end&&r.type===rm.type));persist(nd,buildTimeOffChangelog("timeoff_remove",rm));setDelConfirm(null);}}>Remove</button></div></div></div>}
  </div>);
}

// ── GITHUB GUIDE TAB ──
function GitHubGuideTab(){
  const steps=[{num:1,icon:"🔑",title:"Log in as Manager & make changes",body:"Use the Manager Login button. Make edits in Roster, Schedule, or Time Off tabs."},{num:2,icon:"📋",title:"Open Export Changes",body:"Click the orange Export button. Copy the code for each change."},{num:3,icon:"🐙",title:"Open file on GitHub",body:"Go to your repo, click the HTML file, click the pencil icon."},{num:4,icon:"🔍",title:"Find the right array",body:"Ctrl+F for defaultAgents or defaultTimeOff."},{num:5,icon:"✂️",title:"Paste your change",body:"ADD before ]; / EDIT by replacing / DELETE the line."},{num:6,icon:"💾",title:"Commit",body:"Add a description, click Commit changes."},{num:7,icon:"✅",title:"Verify",body:"Refresh the Team Hub to confirm."}];
  return(<div style={{maxWidth:780}}><div style={{background:"linear-gradient(135deg,#1e293b,#334155)",borderRadius:16,padding:"20px 24px",color:"#fff",marginBottom:28}}><div style={{fontSize:22,fontWeight:800}}>🐙 How to Update on GitHub</div></div>{steps.map(s=><div key={s.num} className="guide-step"><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}><div style={{background:"#4f46e5",color:"#fff",borderRadius:"50%",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,flexShrink:0}}>{s.num}</div><div style={{fontWeight:700,fontSize:15}}>{s.icon} {s.title}</div></div><p style={{fontSize:13,color:"#475569",lineHeight:1.6}}>{s.body}</p></div>)}<div style={{background:"#fff5f5",border:"1px solid #fca5a5",borderRadius:12,padding:"14px 18px",marginTop:12,fontSize:12,color:"#991b1b"}}><strong>⚠️</strong> Manager changes are temporary. Export and commit to GitHub to make permanent.</div></div>);
}

// ── APP ──
function App(){
  const[agents,setAgents]=useState(defaultAgents);const[timeOffData,setTimeOffData]=useState(defaultTimeOff);const[isManager,setIsManager]=useState(false);const[showLogin,setShowLogin]=useState(false);const[tab,setTab]=useState("overview");const[rosterUnlocked,setRosterUnlocked]=useState(false);const[showRosterLogin,setShowRosterLogin]=useState(false);const[changeLog,setChangeLog]=useState([]);const[showExport,setShowExport]=useState(false);
  const onChangeLogged=useCallback(entry=>{setChangeLog(prev=>[...prev,entry]);},[]);
  const activeCount=useMemo(()=>getActiveAgents(agents).length,[agents]);
  const TABS=[{id:"overview",label:"📊 Overview"},{id:"today",label:"🌅 Today"},{id:"schedule",label:"📅 Schedule"},{id:"timeoff",label:"🏖️ Time Off"},{id:"roster",label:"👥 Roster",locked:true},{id:"guide",label:"📖 GitHub Guide"}];
  function handleTabClick(t){if(t==="roster"&&!rosterUnlocked){setShowRosterLogin(true);return;}setTab(t);}
  return(<div style={{minHeight:"100vh",background:"#f8fafc"}}>
    <div style={{background:"#1e293b",color:"#fff",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 8px #0003"}}><div><div style={{fontWeight:700,fontSize:18}}>📋 Customer Solutions — Team Hub</div><div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>Feb – Mar 2026 · {activeCount} active agents</div></div><div style={{display:"flex",gap:8,alignItems:"center"}}>{isManager&&<button className="btn btn-export" style={{position:"relative"}} onClick={()=>setShowExport(true)}>📋 Export{changeLog.length>0&&<span style={{position:"absolute",top:-6,right:-6,background:"#ef4444",color:"#fff",borderRadius:10,fontSize:10,padding:"1px 5px",fontWeight:800}}>{changeLog.length}</span>}</button>}{isManager?<button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>{setIsManager(false);setRosterUnlocked(false);}}>🔒 Lock</button>:<button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>setShowLogin(true)}>🔑 Manager Login</button>}</div></div>
    <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 24px",display:"flex",gap:4,overflowX:"auto"}}>{TABS.map(t=><button key={t.id} className={`nav-tab${tab===t.id?" active":""}`} onClick={()=>handleTabClick(t.id)}>{t.label}{t.locked&&!rosterUnlocked&&<span style={{fontSize:10,marginLeft:4,opacity:.6}}>🔒</span>}</button>)}</div>
    {isManager&&changeLog.length>0&&<div className="export-banner" style={{margin:"12px 24px 0"}}><div><span style={{fontWeight:700,fontSize:13}}>📋 {changeLog.length} unsaved change{changeLog.length!==1?"s":""}</span><span style={{fontSize:12,color:"#92400e",marginLeft:8}}>Export & commit to GitHub.</span></div><button className="btn btn-export" onClick={()=>setShowExport(true)}>View →</button></div>}
    <div style={{padding:"20px 24px",maxWidth:1300,margin:"0 auto"}}>
      {tab==="today"&&<TodayTab agents={agents} timeOffData={timeOffData}/>}
      {tab==="roster"&&rosterUnlocked&&<RosterTab agents={agents} setAgents={setAgents} onChangeLogged={onChangeLogged}/>}
      {tab==="overview"&&<OverviewTab agents={agents} timeOffData={timeOffData}/>}
      {tab==="schedule"&&<ScheduleTab agents={agents} setAgents={setAgents} isManager={isManager} timeOffData={timeOffData} onChangeLogged={onChangeLogged}/>}
      {tab==="timeoff"&&<TimeOffTab agents={agents} timeOffData={timeOffData} setTimeOffData={setTimeOffData} isManager={isManager} onChangeLogged={onChangeLogged}/>}
      {tab==="guide"&&<GitHubGuideTab/>}
    </div>
    {showLogin&&<LoginModal onLogin={()=>{setIsManager(true);setRosterUnlocked(true);setShowLogin(false);setTab("overview");}} onClose={()=>setShowLogin(false)}/>}
    {showRosterLogin&&<LoginModal onLogin={()=>{setRosterUnlocked(true);setIsManager(true);setShowRosterLogin(false);setTab("roster");}} onClose={()=>setShowRosterLogin(false)}/>}
    {showExport&&<ExportModal log={changeLog} onClose={()=>setShowExport(false)} onClear={()=>setChangeLog([])}/>}
  </div>);
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
