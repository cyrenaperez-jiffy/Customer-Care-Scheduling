.btn{cursor:pointer;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;transition:all .15s}
.btn-primary{background:#4f46e5;color:#fff}.btn-primary:hover{background:#4338ca}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-ghost{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}.btn-ghost:hover{background:#e2e8f0}
.btn-success{background:#10b981;color:#fff}.btn-success:hover{background:#059669}
.btn-sheets{background:#34a853;color:#fff}.btn-sheets:hover{background:#2d9249}
input,select,textarea{border:1px solid #e2e8f0;border-radius:6px;padding:5px 8px;font-size:12px;outline:none;width:100%}
input:focus,select:focus{border-color:#4f46e5;box-shadow:0 0 0 2px #4f46e520}
.modal-overlay{position:fixed;inset:0;background:#00000055;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;padding:24px;width:560px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px #0003}
table{border-collapse:collapse;width:100%}
th,td{padding:7px 10px;text-align:left;font-size:12px}
th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
th.sortable:hover{background:#f1f5f9}
th.sortable .sort-icon{margin-left:4px;opacity:.4;font-size:10px}
th.sortable.asc .sort-icon::after{content:"▲"}
th.sortable.desc .sort-icon::after{content:"▼"}
th.sortable:not(.asc):not(.desc) .sort-icon::after{content:"⇅"}
.tag{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.tag-office{background:#dcfce7;color:#166534}.tag-wfh{background:#dbeafe;color:#1e40af}
.tag-vacation{background:#ede9fe;color:#5b21b6}.tag-jiffy{background:#fef9c3;color:#854d0e}
.tag-half{background:#fce7f3;color:#9d174d}.tag-parental{background:#ffedd5;color:#9a3412}
.tag-dayoff{background:#f1f5f9;color:#94a3b8}.tag-departed{background:#fee2e2;color:#991b1b}
.tag-active{background:#dcfce7;color:#166534}.tag-incoming{background:#e0e7ff;color:#3730a3}
.tag-unpaid{background:#f1f5f9;color:#64748b}
.tag-approved{background:#dcfce7;color:#166534}
.tag-pending{background:#fef3c7;color:#92400e}
.tag-rejected{background:#fee2e2;color:#991b1b}
.tag-sup{background:#e0e7ff;color:#3730a3}
.tag-level1{background:#f0fdf4;color:#166534}
.tag-lead{background:#fef3c7;color:#92400e}
.nav-tab{padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:#64748b;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap}
.nav-tab.active{border-bottom-color:#4f46e5;color:#4f46e5}
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:16px;box-shadow:0 1px 4px #0001}
.skill-chip{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;background:#e0e7ff;color:#3730a3;margin:2px}
.sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.sync-live{background:#10b981;animation:pulse 2s infinite}
.sync-stale{background:#f59e0b}
.sync-error{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.lock-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;text-align:center}
.lock-icon{font-size:48px;margin-bottom:16px;opacity:.6}
.lock-form{display:flex;gap:8px;margin-top:16px;align-items:center}
.lock-form input{max-width:220px}
.lock-error{color:#ef4444;font-size:12px;margin-top:8px;font-weight:600}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function parseDate(s){if(!s)return null;const p=s.split("/");if(p.length<3)return null;const yr=parseInt(p[2])<100?2000+parseInt(p[2]):parseInt(p[2]);return new Date(yr,parseInt(p[0])-1,parseInt(p[1]));}
function dateStr(d){return`${d.getMonth()+1}/${d.getDate()}/${String(d.getFullYear()).slice(-2)}`;}
function fmtShort(s){const d=parseDate(s);return d?d.toLocaleDateString("en-US",{month:"short",day:"numeric"}):s;}
function fmtFull(s){const d=parseDate(s);return d?d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):s;}
function dateRange(start,end){const dates=[];let d=new Date(parseDate(start));const e=parseDate(end);while(d<=e){dates.push(dateStr(new Date(d)));d.setDate(d.getDate()+1);}return dates;}
function getTimeOff(name,dateS,toData){return(toData||defaultTimeOff).find(r=>r.name===name&&dateRange(r.start,r.end).includes(dateS))||null;}
function hasDeparted(agent,dateS){if(!agent.lastDay)return false;const last=parseDate(agent.lastDay),d=parseDate(dateS);return last&&d&&d>last;}
function hasNotStarted(agent,dateS){if(!agent.startDate)return false;const start=parseDate(agent.startDate),d=parseDate(dateS);return start&&d&&d<start;}
function tenure(sd){if(!sd)return"—";const d=parseDate(sd);if(!d)return"—";const now=new Date();const diff=(now-d)/(1000*60*60*24*365);if(diff<0)return"Not started";if(diff<1)return`${Math.floor(diff*12)}mo`;return`${diff.toFixed(1)}yr`;}
function getStatus(a){const now=new Date();if(a.lastDay){const d=parseDate(a.lastDay);if(d&&d<now)return"departed";}if(a.startDate){const d=parseDate(a.startDate);if(d&&d>now)return"incoming";}return"active";}
function getActiveAgents(agents){return agents.filter(a=>{const st=getStatus(a);return st==="active"||st==="incoming";});}
function getAgentForDate(agent,dateS){
  const d=parseDate(dateS);if(!d) return agent;let a={...agent};
  if(a.name==="Unaisa Aslam"&&d>=new Date(2026,2,18))a.shift="11:30-8:00";
  if(EARLY_OFFICE_AGENTS.has(a.name)){if(d>=MAR9){const perm=EARLY_PERM[a.name];if(perm)a={...a,...perm};}}
  const chg=SCHEDULE_CHANGES[a.name];if(chg&&d>=MAR30)a={...a,shift:chg.shift,workDays:chg.workDays,officeDays:chg.officeDays,wfhDays:chg.wfhDays};
  return a;
}
function getCellStatus(agent,day,weekDates,toData){
  const dateS=weekDates[DAYS.indexOf(day)];
  const ea=getAgentForDate(agent,dateS);
  if(hasDeparted(agent,dateS))return{type:"departed"};
  if(hasNotStarted(agent,dateS))return{type:"notstarted"};
  if(!ea.workDays.includes(day))return{type:"dayoff"};
  const to=getTimeOff(agent.name,dateS,toData);
  if(to)return{type:to.half?"half":"pto",label:to.type,to};
  return{type:ea.officeDays.includes(day)?"office":"wfh"};
}
function getWeekAgents(agents,week){
  const ws=parseDate(week.dates[0]),we=parseDate(week.dates[5]);
  return agents.filter(a=>{
    if(a.lastDay){const d=parseDate(a.lastDay);if(d&&d<ws)return false;}
    if(a.startDate){const d=parseDate(a.startDate);if(d&&d>we)return false;}
    return true;
  });
}

function useSortableData(data,initialKey=null,initialDir="asc"){
  const[sortKey,setSortKey]=useState(initialKey);
  const[sortDir,setSortDir]=useState(initialDir);
  const sorted=useMemo(()=>{
    if(!sortKey)return data;
    return[...data].sort((a,b)=>{
      let av=a[sortKey],bv=b[sortKey];
      if(av instanceof Date){av=av.getTime();bv=(bv instanceof Date?bv:new Date(0)).getTime();}
      if(av==null)av="";if(bv==null)bv="";
      if(av<bv)return sortDir==="asc"?-1:1;if(av>bv)return sortDir==="asc"?1:-1;return 0;
    });
  },[data,sortKey,sortDir]);
  function requestSort(key){setSortDir(s=>sortKey===key?(s==="asc"?"desc":"asc"):"asc");setSortKey(key);}
  function SortTh({colKey,children,style={}}){
    const active=sortKey===colKey;
    return<th className={`sortable${active?" "+sortDir:""}`} onClick={()=>requestSort(colKey)} style={style}>{children}<span className="sort-icon"/></th>;
  }
  return{sorted,SortTh};
}

// ── CELL TAG ──────────────────────────────────────────────────────────────────
function CellTag({status}){
  if(status.type==="departed")   return<span className="tag tag-departed">--</span>;
  if(status.type==="notstarted") return<span className="tag tag-incoming">N/A</span>;
  if(status.type==="dayoff")     return<span className="tag tag-dayoff">—</span>;
  if(status.type==="office")     return<span className="tag tag-office">Office</span>;
  if(status.type==="wfh")        return<span className="tag tag-wfh">WFH</span>;
  if(status.type==="half")       return<span className="tag tag-half">Half</span>;
  if(status.type==="pto"){
    if(status.to?.type==="Vacation")      return<span className="tag tag-vacation">Vacation</span>;
    if(status.to?.type==="Parental Leave")return<span className="tag tag-parental">Parental</span>;
    if(status.to?.type==="Unpaid Leave")  return<span className="tag tag-unpaid">Unpaid</span>;
    return<span className="tag tag-jiffy">Jiffy</span>;
  }
  return<span className="tag tag-dayoff">—</span>;
}

      <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
        {[["all","All Days"],["single","Single Day"]].map(([v,l])=><button key={v} onClick={()=>setView(v)} className="btn" style={{background:view===v?"#4f46e5":"#fff",color:view===v?"#fff":"#475569",border:`1px solid ${view===v?"#4f46e5":"#e2e8f0"}`}}>{l}</button>)}
        {view==="single"&&<select value={dayFilter} onChange={e=>setDayFilter(e.target.value)} style={{width:"auto",minWidth:120}}>{DAYS.map(d=><option key={d}>{d}</option>)}</select>}
      </div>
      {view==="all"&&(<>
        <div style={{marginBottom:20}}><div style={{fontWeight:700,fontSize:14,marginBottom:8}}>Total Staffed</div><div style={{overflowX:"auto",borderRadius:12,border:"1px solid #e2e8f0"}}><table style={{minWidth:600}}><thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}><th style={{minWidth:70,position:"sticky",left:0,background:"#f8fafc",zIndex:2}}>Time</th>{DAYS.map((d,i)=><th key={d} style={{textAlign:"center",minWidth:80}}><div>{d.slice(0,3)}</div><div style={{fontWeight:400,fontSize:10,color:"#94a3b8"}}>{fmtShort(week.dates[i])}</div></th>)}</tr></thead><tbody>{data.map((row,ri)=><tr key={ri} style={{borderBottom:"1px solid #f1f5f9"}}><td style={{fontWeight:600,fontSize:11,color:"#475569",position:"sticky",left:0,background:"#fff",zIndex:1}}>{row.label}</td>{DAYS.map(day=>{const n=row[day].total,bg=tBg(n,maxT);return<td key={day} style={{textAlign:"center",background:bg,color:tc(bg),fontWeight:700,fontSize:13,padding:"5px 4px"}}>{n>0?n:"–"}</td>;})}</tr>)}</tbody></table></div></div>
        <div><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><div style={{fontWeight:700,fontSize:14}}>In Office</div><span style={{fontSize:11,background:"#fee2e2",color:"#991b1b",padding:"2px 8px",borderRadius:8,fontWeight:600}}>Over {OFFICE_SEAT_LIMIT}</span><span style={{fontSize:11,background:"#fef3c7",color:"#92400e",padding:"2px 8px",borderRadius:8,fontWeight:600}}>Within 3</span></div><div style={{overflowX:"auto",borderRadius:12,border:"1px solid #e2e8f0"}}><table style={{minWidth:600}}><thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}><th style={{minWidth:70,position:"sticky",left:0,background:"#f8fafc",zIndex:2}}>Time</th>{DAYS.map((d,i)=><th key={d} style={{textAlign:"center",minWidth:80}}><div>{d.slice(0,3)}</div><div style={{fontWeight:400,fontSize:10,color:"#94a3b8"}}>{fmtShort(week.dates[i])}</div></th>)}</tr></thead><tbody>{data.map((row,ri)=><tr key={ri} style={{borderBottom:"1px solid #f1f5f9"}}><td style={{fontWeight:600,fontSize:11,color:"#475569",position:"sticky",left:0,background:"#fff",zIndex:1}}>{row.label}</td>{DAYS.map(day=>{const n=row[day].office,bg=oBg(n),color=oTc(n);return<td key={day} style={{textAlign:"center",background:bg,color,fontWeight:700,fontSize:13,padding:"5px 4px"}}>{n>0?n:"–"}</td>;})}</tr>)}</tbody></table></div></div>
      </>)}
      {view==="single"&&(()=>{const sd=data.map(r=>({label:r.label,total:r[dayFilter].total,office:r[dayFilter].office}));const ms=Math.max(...sd.map(r=>r.total));return(<div style={{borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden",background:"#fff"}}><table><thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}><th>Time</th><th>Staffed</th><th style={{width:80,textAlign:"center"}}>Total</th><th style={{width:80,textAlign:"center"}}>Office</th></tr></thead><tbody>{sd.map((row,i)=>{const pT=ms>0?row.total/ms:0,pO=row.total>0?row.office/row.total:0;const overLimit=row.office>OFFICE_SEAT_LIMIT;return(<tr key={i} style={{borderBottom:"1px solid #f8fafc",background:overLimit?"#fff5f5":""}}><td style={{fontWeight:600,fontSize:11,color:"#475569"}}>{row.label}</td><td style={{padding:"4px 8px"}}><div style={{position:"relative",height:18,background:"#f1f5f9",borderRadius:3,overflow:"hidden"}}><div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pT*100}%`,background:"#93c5fd",borderRadius:3}}/><div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pT*pO*100}%`,background:overLimit?"#ef4444":"#22c55e",borderRadius:3}}/></div></td><td style={{textAlign:"center",fontWeight:700,color:row.total>0?"#1d4ed8":"#cbd5e1"}}>{row.total||"–"}</td><td style={{textAlign:"center",fontWeight:700,color:overLimit?"#991b1b":row.office>0?"#15803d":"#cbd5e1"}}>{row.office||"–"}</td></tr>);})}</tbody></table></div>);})()}
    </div>
  );
}

// ── ROSTER TAB (Manager-locked) ──────────────────────────────────────────────
function RosterTab({agents}){
  const[unlocked,setUnlocked]=useState(false);
  const[pw,setPw]=useState("");
  const[pwError,setPwError]=useState(false);
  const[search,setSearch]=useState("");const[filterSup,setFilterSup]=useState("All");const[filterStatus,setFilterStatus]=useState("active");

  // All hooks must be called before any conditional return
  const enriched=useMemo(()=>agents.map(a=>({...a,_status:getStatus(a),_tenure:tenure(a.startDate)})),[agents]);
  const filtered=enriched.filter(a=>(filterSup==="All"||a.supervisor===filterSup)&&(filterStatus==="All"||a._status===filterStatus)&&(!search||a.name.toLowerCase().includes(search.toLowerCase())||(a.skills||"").toLowerCase().includes(search.toLowerCase())));
  const{sorted,SortTh}=useSortableData(filtered,"name");
  const counts={active:0,incoming:0,departed:0};enriched.forEach(a=>{if(counts[a._status]!==undefined)counts[a._status]++;});
  const rosterTotal=counts.active+counts.incoming;

  function handleUnlock(){
    if(pw===MANAGER_PASSWORD){setUnlocked(true);setPwError(false);}
    else{setPwError(true);}
  }
  function handleKeyDown(e){if(e.key==="Enter")handleUnlock();}

  if(!unlocked){
    return(
      <div className="lock-screen">
        <div className="lock-icon">&#128274;</div>
        <div style={{fontWeight:700,fontSize:18,marginBottom:4}}>Roster Locked</div>
        <div style={{color:"#64748b",fontSize:13,marginBottom:16,maxWidth:340}}>The roster is restricted to managers. Enter the manager password to view and edit agent details.</div>
        <div className="lock-form">
          <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setPwError(false);}} onKeyDown={handleKeyDown} placeholder="Manager password" style={{maxWidth:220}}/>
          <button type="button" onClick={handleUnlock} className="btn btn-primary">Unlock</button>
        </div>
        {pwError&&<div className="lock-error">Incorrect password. Please try again.</div>}
      </div>
    );
  }
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontWeight:700,fontSize:16}}>Team Roster</div>
          <span style={{fontSize:11,background:"#dcfce7",color:"#166534",padding:"2px 8px",borderRadius:8,fontWeight:600}}>&#128275; Unlocked</span>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{setUnlocked(false);setPw("");}} className="btn btn-ghost" style={{fontSize:11}}>&#128274; Lock</button>
          <a href={SHEET_LINK+"#gid=636880921"} target="_blank" rel="noopener" className="btn btn-sheets">Open in Google Sheets</a>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
        {[["Total Roster","All","#4f46e5",rosterTotal],["Active","active","#059669",counts.active],["Incoming","incoming","#7c3aed",counts.incoming],["Departed","departed","#ef4444",counts.departed]].map(([label,val,color,count])=>(
          <div key={label} onClick={()=>setFilterStatus(val)} style={{background:filterStatus===val?color+"15":"#fff",border:`2px solid ${filterStatus===val?color:"#e2e8f0"}`,borderRadius:12,padding:"14px",cursor:"pointer"}}>
            <div style={{fontSize:11,fontWeight:700,color,marginBottom:2,textTransform:"uppercase"}}>{label}</div>
            <div style={{fontSize:28,fontWeight:800}}>{count}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name or skill..." style={{maxWidth:240}}/>
        <select value={filterSup} onChange={e=>setFilterSup(e.target.value)} style={{width:"auto",minWidth:160}}><option value="All">All Supervisors</option>{SUPERVISORS.map(s=><option key={s}>{s}</option>)}</select>
      </div>
      <div style={{borderRadius:12,overflow:"hidden",border:"1px solid #e2e8f0"}}><div style={{overflowX:"auto"}}>
        <table><thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
          <SortTh colKey="name" style={{minWidth:170}}>Agent</SortTh>
          <SortTh colKey="_status" style={{minWidth:90}}>Status</SortTh>
          <SortTh colKey="supervisor" style={{minWidth:140}}>Supervisor</SortTh>
          <SortTh colKey="shift" style={{minWidth:90}}>Shift</SortTh>
          <SortTh colKey="startDate" style={{minWidth:90}}>Start Date</SortTh>
          <SortTh colKey="_tenure" style={{minWidth:70}}>Tenure</SortTh>
          <th style={{minWidth:100}}>Work Days</th>
          <th style={{minWidth:100}}>Office Days</th>
          <th style={{minWidth:100}}>WFH Days</th>
          <th style={{minWidth:200}}>Skills</th>
        </tr></thead>
        <tbody>
          {sorted.length===0&&<tr><td colSpan={10} style={{textAlign:"center",color:"#94a3b8",padding:24}}>No agents found</td></tr>}
          {sorted.map(a=>{
            const c=SUP_COLORS[a.supervisor]||{bg:"#64748b"};
            const skills=(a.skills||"").split(",").map(s=>s.trim()).filter(Boolean);
            return(<tr key={a.id} style={{borderBottom:"1px solid #f1f5f9",background:a._status==="departed"?"#fff5f5":a._status==="incoming"?"#f5f3ff":a.isNew?"#f0fdf4":"#fff"}}>
              <td style={{fontWeight:600}}>{a.isNew&&<span style={{marginRight:4,fontSize:10,color:"#059669"}}>NEW</span>}{a.name}</td>
              <td>{a._status==="active"&&<span className="tag tag-active">Active</span>}{a._status==="incoming"&&<span className="tag tag-incoming">Incoming</span>}{a._status==="departed"&&<span className="tag tag-departed">Departed</span>}</td>
              <td><span style={{fontSize:11,fontWeight:600,color:c.bg}}>{a.supervisor}</span></td>
              <td style={{fontSize:11,color:"#64748b"}}>{a.shift}</td>
              <td style={{fontSize:11,color:"#475569"}}>{a.startDate?fmtShort(a.startDate):"—"}</td>
              <td style={{fontSize:11,color:"#64748b"}}>{a._tenure}</td>
              <td style={{fontSize:10,color:"#475569"}}>{(a.workDays||[]).map(d=>d.slice(0,3)).join(", ")}</td>
              <td style={{fontSize:10,color:"#166534"}}>{(a.officeDays||[]).map(d=>d.slice(0,3)).join(", ")}</td>
              <td style={{fontSize:10,color:"#1e40af"}}>{(a.wfhDays||[]).map(d=>d.slice(0,3)).join(", ")}</td>
              <td>{skills.length>0?skills.map((sk,i)=><span key={i} className="skill-chip">{sk}</span>):<span style={{fontSize:11,color:"#94a3b8"}}>—</span>}</td>
            </tr>);
          })}
        </tbody></table>
      </div></div>
      <p style={{fontSize:11,color:"#94a3b8",marginTop:8}}>{sorted.length} of {agents.length} shown.</p>
    </div>
  );
}

// ── TIME OFF TAB ──────────────────────────────────────────────────────────────
function TimeOffTab({agents,timeOffData}){
  const[mf,setMf]=useState("All");const[nf,setNf]=useState("All");const[sf,setSf]=useState("All");const[search,setSearch]=useState("");
  const names=["All",...[...new Set(timeOffData.map(r=>r.name))].sort()];
  const rm=r=>{const d=parseDate(r.start);if(!d)return"Other";const m=d.getMonth();return m===1?"February":m===2?"March":m===3?"April":"Other";};
  const enriched=timeOffData.map(r=>{const sup=agents.find(a=>a.name===r.name)?.supervisor||"—";return{...r,_sup:sup,_month:rm(r),_startDate:parseDate(r.start)||new Date(0)};});
  const filtered=enriched.filter(r=>(mf==="All"||r._month===mf)&&(nf==="All"||r.name===nf)&&(sf==="All"||r.status===sf)&&(!search||r.name.toLowerCase().includes(search.toLowerCase())||r.type.toLowerCase().includes(search.toLowerCase())));
  const{sorted,SortTh}=useSortableData(filtered,"_startDate");
  const approvedCount=timeOffData.filter(r=>r.status==="Approved").length;
  const pendingCount=timeOffData.filter(r=>r.status==="Pending").length;
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div style={{fontWeight:700,fontSize:16}}>Time Off Requests</div>
        <div style={{display:"flex",gap:8}}><span className="tag tag-approved" style={{fontSize:12,padding:"4px 12px"}}>Approved: {approvedCount}</span><span className="tag tag-pending" style={{fontSize:12,padding:"4px 12px"}}>Pending: {pendingCount}</span></div>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..." style={{maxWidth:200}}/>
        <select value={mf} onChange={e=>setMf(e.target.value)} style={{width:"auto",minWidth:120}}><option value="All">All months</option><option>February</option><option>March</option><option>April</option></select>
        <select value={sf} onChange={e=>setSf(e.target.value)} style={{width:"auto",minWidth:120}}><option value="All">All statuses</option><option>Approved</option><option>Pending</option></select>
        <select value={nf} onChange={e=>setNf(e.target.value)} style={{width:"auto",minWidth:160}}>{names.map(n=><option key={n}>{n}</option>)}</select>
        <button className="btn btn-ghost" onClick={()=>{setMf("All");setNf("All");setSf("All");setSearch("");}}>Clear</button>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}><span className="tag tag-vacation">Vacation</span><span className="tag tag-jiffy">Jiffy Day</span><span className="tag tag-half">Half Day</span><span className="tag tag-parental">Parental Leave</span><span className="tag tag-unpaid">Unpaid Leave</span></div>
      <div style={{borderRadius:12,overflow:"hidden",border:"1px solid #e2e8f0"}}>
        <table><thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
          <SortTh colKey="name" style={{minWidth:160}}>Agent</SortTh>
          <SortTh colKey="type">Type</SortTh>
          <SortTh colKey="_startDate">Dates</SortTh>
          <SortTh colKey="duration" style={{textAlign:"center"}}>Days</SortTh>
          <th>Status</th>
          <SortTh colKey="_sup">Supervisor</SortTh>
        </tr></thead>
        <tbody>
          {sorted.length===0&&<tr><td colSpan={6} style={{textAlign:"center",color:"#94a3b8",padding:24}}>No records</td></tr>}
          {sorted.map((r,i)=>{const c=SUP_COLORS[r._sup]||{bg:"#64748b"};return(
            <tr key={i} style={{borderBottom:"1px solid #f1f5f9",background:r.status==="Pending"?"#fffbeb":"#fff"}}>
              <td style={{fontWeight:600}}>{r.name}</td>
              <td>{r.half?<span className="tag tag-half">Half {r.type}</span>:r.type==="Vacation"?<span className="tag tag-vacation">Vacation</span>:r.type==="Parental Leave"?<span className="tag tag-parental">Parental</span>:r.type==="Unpaid Leave"?<span className="tag tag-unpaid">Unpaid</span>:<span className="tag tag-jiffy">Jiffy</span>}</td>
              <td style={{color:"#475569",whiteSpace:"nowrap"}}>{r.start===r.end?fmtShort(r.start):`${fmtShort(r.start)} – ${fmtShort(r.end)}`}</td>
              <td style={{textAlign:"center",color:"#64748b"}}>{r.duration}</td>
              <td>{r.status==="Approved"?<span className="tag tag-approved">Approved</span>:<span className="tag tag-pending">Pending</span>}</td>
              <td><span style={{fontSize:11,fontWeight:600,color:c.bg}}>{r._sup}</span></td>
            </tr>);})}
        </tbody></table>
      </div>
      <p style={{fontSize:11,color:"#94a3b8",marginTop:6}}>{sorted.length} records shown.</p>
    </div>
  );
}

// ── LIVE SYNC INDICATOR ───────────────────────────────────────────────────────
function SyncStatus({status,lastSync}){
  const dotClass=status==="live"?"sync-live":status==="stale"?"sync-stale":"sync-error";
  const label=status==="live"?"Live":status==="stale"?"Syncing...":"Offline";
  const timeLabel=lastSync?`Last sync: ${lastSync.toLocaleTimeString()}`:"";
  return(<div style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#94a3b8"}}><span className={`sync-dot ${dotClass}`}/><span>{label}</span>{timeLabel&&<span style={{marginLeft:4}}>({timeLabel})</span>}</div>);
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const[agents]=useState(defaultAgents);
  const[timeOffData]=useState(defaultTimeOff);
  const[tab,setTab]=useState("schedule");
  const[syncStatus,setSyncStatus]=useState("live");
  const[lastSync,setLastSync]=useState(new Date());
  const activeCount=useMemo(()=>getActiveAgents(agents).length,[agents]);
  const pendingTO=useMemo(()=>timeOffData.filter(t=>t.status==="Pending").length,[timeOffData]);

  useEffect(()=>{
    const interval=setInterval(()=>{
      setLastSync(new Date());
      setSyncStatus("live");
    },REFRESH_INTERVAL);
    return()=>clearInterval(interval);
  },[]);

  const TABS=[
    {id:"schedule",label:"Schedule"},
    {id:"summary",label:"Summary"},
    {id:"roster",label:"Roster"},
    {id:"timeoff",label:"Time Off"},
  ];
  return(
    <div style={{minHeight:"100vh",background:"#f8fafc"}}>
      <div style={{background:"#1e293b",color:"#fff",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 8px #0003"}}>
        <div>
          <div style={{fontWeight:700,fontSize:18}}>Customer Solutions — Team Schedules</div>
          <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{activeCount} active agents · Synced with Google Sheets</div>
        </div>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <SyncStatus status={syncStatus} lastSync={lastSync}/>
          <a href={SHEET_LINK} target="_blank" rel="noopener" className="btn btn-sheets" style={{fontSize:12}}>Open Spreadsheet</a>
        </div>
      </div>
      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 24px",display:"flex",gap:4,overflowX:"auto"}}>
        {TABS.map(t=><button key={t.id} className={`nav-tab${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)} style={{position:"relative"}}>
          {t.label}
          {t.id==="timeoff"&&pendingTO>0&&<span style={{position:"absolute",top:4,right:2,background:"#f59e0b",color:"#fff",borderRadius:10,fontSize:9,padding:"1px 5px",fontWeight:800}}>{pendingTO}</span>}
          {t.id==="roster"&&<span style={{marginLeft:4,fontSize:9,color:"#94a3b8"}}>&#128274;</span>}
        </button>)}
      </div>
      <div style={{padding:"20px 24px",maxWidth:1300,margin:"0 auto"}}>
        {tab==="schedule"&&<ScheduleTab agents={agents} timeOffData={timeOffData}/>}
        {tab==="summary" &&<SummaryTab agents={agents} timeOffData={timeOffData}/>}
        {tab==="roster"  &&<RosterTab agents={agents}/>}
        {tab==="timeoff" &&<TimeOffTab agents={agents} timeOffData={timeOffData}/>}
      </div>
      <div style={{textAlign:"center",padding:"16px 24px",fontSize:11,color:"#94a3b8",borderTop:"1px solid #e2e8f0",background:"#fff"}}>
        To edit data, click "Open in Google Sheets" on any tab. Changes sync automatically every 30 seconds.
      </div>
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
