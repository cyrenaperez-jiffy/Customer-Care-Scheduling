body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#1e293b;font-size:14px}
.btn{cursor:pointer;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;transition:all .15s}
.btn-primary{background:#4f46e5;color:#fff}.btn-primary:hover{background:#4338ca}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-ghost{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}.btn-ghost:hover{background:#e2e8f0}
.btn-success{background:#10b981;color:#fff}.btn-success:hover{background:#059669}
input,select,textarea{border:1px solid #e2e8f0;border-radius:6px;padding:5px 8px;font-size:12px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:#4f46e5;box-shadow:0 0 0 2px #4f46e520}
textarea{resize:vertical;min-height:60px}
.modal-overlay{position:fixed;inset:0;background:#00000055;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;padding:24px;width:520px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px #0003}
table{border-collapse:collapse;width:100%}
th,td{padding:7px 10px;text-align:left;font-size:12px}
th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
th.sortable:hover{background:#f1f5f9}
th.sortable .sort-icon{margin-left:4px;opacity:.4;font-size:10px}
th.sortable.asc .sort-icon::after{content:"▲"}
th.sortable.desc .sort-icon::after{content:"▼"}
th.sortable:not(.asc):not(.desc) .sort-icon::after{content:"⇅"}
.tag{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.tag-office{background:#dcfce7;color:#166534}.tag-wfh{background:#dbeafe;color:#1e40af}
.tag-vacation{background:#ede9fe;color:#5b21b6}.tag-jiffy{background:#fef9c3;color:#854d0e}
.tag-half{background:#fce7f3;color:#9d174d}.tag-parental{background:#ffedd5;color:#9a3412}
.tag-dayoff{background:#f1f5f9;color:#94a3b8}.tag-primary{background:#dbeafe;color:#1e40af}
.tag-backup{background:#f3f4f6;color:#6b7280}.tag-lunch{background:#fef3c7;color:#92400e}
.tag-departed{background:#fee2e2;color:#991b1b}.tag-active{background:#dcfce7;color:#166534}
.tag-incoming{background:#e0e7ff;color:#3730a3}.tag-risk{background:#fee2e2;color:#991b1b}
.tag-warn{background:#fef3c7;color:#92400e}.tag-ok{background:#dcfce7;color:#166534}
.tag-changed{background:#fef3c7;color:#92400e}
.nav-tab{padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:#64748b;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap}
.nav-tab.active{border-bottom-color:#4f46e5;color:#4f46e5}
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:16px;box-shadow:0 1px 4px #0001}
.risk-card{border-left:4px solid #ef4444;background:#fff5f5}
.warn-card{border-left:4px solid #f59e0b;background:#fffbeb}
.ok-card{border-left:4px solid #10b981;background:#f0fdf4}
.skill-chip{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;background:#e0e7ff;color:#3730a3;margin:2px}
::-webkit-scrollbar{width:6px;height:6px}

// ── Core helpers ─────────────────────────────────────────────────────────────
function parseDate(s){if(!s)return null;const p=s.split("/");if(p.length<3)return null;const yr=parseInt(p[2])<100?2000+parseInt(p[2]):parseInt(p[2]);return new Date(yr,parseInt(p[0])-1,parseInt(p[1]));}
function dateStr(d){return`${d.getMonth()+1}/${d.getDate()}/${String(d.getFullYear()).slice(-2)}`;}
function fmtShort(s){const d=parseDate(s);return d?d.toLocaleDateString("en-US",{month:"short",day:"numeric"}):s;}
function fmtFull(s){const d=parseDate(s);return d?d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):s;}
function dateRange(start,end){const dates=[];let d=new Date(parseDate(start));const e=parseDate(end);while(d<=e){dates.push(dateStr(new Date(d)));d.setDate(d.getDate()+1);}return dates;}
function getTimeOff(name,dateS){return timeOffData.find(r=>r.name===name&&dateRange(r.start,r.end).includes(dateS))||null;}
function hasDeparted(agent,dateS){if(!agent.lastDay)return false;const last=parseDate(agent.lastDay),d=parseDate(dateS);return last&&d&&d>last;}
function hasNotStarted(agent,dateS){if(!agent.startDate)return false;const start=parseDate(agent.startDate),d=parseDate(dateS);return start&&d&&d<start;}

function getCellStatus(agent,day,weekDates){
  const dateS=weekDates[DAYS.indexOf(day)];
  const ea=getAgentForDate(agent,dateS);
  if(hasDeparted(agent,dateS))return{type:"departed",dateS,shift:ea.shift};
  if(hasNotStarted(agent,dateS))return{type:"notstarted",dateS,shift:ea.shift};
  if(!ea.workDays.includes(day))return{type:"dayoff",dateS,shift:ea.shift};
  const to=getTimeOff(agent.name,dateS);
  if(to)return{type:to.half?"half":"pto",label:to.type,dateS,to,shift:ea.shift};
  return{type:ea.officeDays.includes(day)?"office":"wfh",dateS,shift:ea.shift};
}

function getStatus(a,refDate=REAL_TODAY){
  if(a.lastDay){const d=parseDate(a.lastDay);if(d&&d<refDate)return"departed";}
  if(a.startDate){const d=parseDate(a.startDate);if(d&&d>refDate)return"incoming";}
  return"active";
}
function getActiveAgents(agents){return agents.filter(a=>{const st=getStatus(a);return st==="active"||st==="incoming";});}
function getWeekAgents(agents,week){
  const ws=parseDate(week.dates[0]),we=parseDate(week.dates[5]);
  return agents.filter(a=>{
    if(a.lastDay){const d=parseDate(a.lastDay);if(d&&d<ws)return false;}
    if(a.startDate){const d=parseDate(a.startDate);if(d&&d>we)return false;}
    return true;
  });
}

function timeToMin(t){if(!t)return 0;const p=t.trim().split(":");return parseInt(p[0])*60+(parseInt(p[1])||0);}
function minToTime(m){const h=Math.floor(m/60),mn=m%60;return`${h}:${String(mn).padStart(2,"0")}`;}
function tenure(sd,refDate=REAL_TODAY){
  if(!sd)return"—";const d=parseDate(sd);if(!d)return"—";
  const diff=(refDate-d)/(1000*60*60*24*365);
  if(diff<0)return"Not started";if(diff<1)return`${Math.floor(diff*12)}mo`;return`${diff.toFixed(1)}yr`;
}
function loadAgents(){try{const s=localStorage.getItem("schedAgents8");return s?JSON.parse(s):defaultAgents;}catch{return defaultAgents;}}
function saveAgents(a){try{localStorage.setItem("schedAgents8",JSON.stringify(a));}catch{}}

// Chat interval staffing for a given day key and hour window
function getChatIntervalCounts(dayKey, expanded=false){
  const winStart = expanded ? CHAT_EXPANDED_START : CHAT_STANDARD_START;
  const winEnd   = expanded ? CHAT_EXPANDED_END   : CHAT_STANDARD_END;
  function pShift(s){const p=s.split("-");return{startMin:timeToMin(p[0]),endMin:timeToMin(p[1])};}
  return INTERVALS.filter(r=>r.minutes>=winStart&&r.minutes<winEnd).map(({label,minutes})=>{
    let pri=0,bkp=0;
    chatAgents.forEach(a=>{const{startMin,endMin}=pShift(a.shift);if(minutes>=startMin&&minutes<endMin){if(a[dayKey]==="X")pri++;else if(a[dayKey]==="B")bkp++;}});
    return{label,minutes,pri,bkp,total:pri+bkp};
  });
}

// ── Sort hook ────────────────────────────────────────────────────────────────
function useSortableData(data,initialKey=null,initialDir="asc"){
  const[sortKey,setSortKey]=useState(initialKey);
  const[sortDir,setSortDir]=useState(initialDir);
  const sorted=useMemo(()=>{
    if(!sortKey)return data;
    return[...data].sort((a,b)=>{
      let av=a[sortKey],bv=b[sortKey];
      if(typeof av==="string"&&/^\d+\/\d+\/\d+$/.test(av)){av=parseDate(av)||0;bv=parseDate(bv)||0;}
      if(av instanceof Date){av=av.getTime();bv=(bv instanceof Date?bv:new Date(0)).getTime();}
      if(av==null)av="";if(bv==null)bv="";
      if(av<bv)return sortDir==="asc"?-1:1;if(av>bv)return sortDir==="asc"?1:-1;return 0;
    });
  },[data,sortKey,sortDir]);
  function requestSort(key){setSortDir(s=>sortKey===key?(s==="asc"?"desc":"asc"):"asc");setSortKey(key);}
  function SortTh({colKey,children,style={}}){
    const active=sortKey===colKey;
    return<th className={`sortable${active?" "+sortDir:""}`} onClick={()=>requestSort(colKey)} style={style}>{children}<span className="sort-icon"/></th>;
  }
  return{sorted,sortKey,sortDir,requestSort,SortTh};
}

function CellTag({status}){
  if(status.type==="departed")   return<span className="tag tag-departed">🚪 Dep.</span>;
  if(status.type==="notstarted") return<span className="tag tag-incoming">⏳ N/A</span>;
  if(status.type==="dayoff")     return<span className="tag tag-dayoff">—</span>;
  if(status.type==="office")     return<span className="tag tag-office">🏢</span>;
  if(status.type==="wfh")        return<span className="tag tag-wfh">🏠</span>;
  if(status.type==="half")       return<span className="tag tag-half">½{status.to?.type==="Vacation"?" Vac":" Jiffy"}</span>;
  if(status.type==="pto"){
    if(status.to?.type==="Vacation")      return<span className="tag tag-vacation">✈️</span>;
    if(status.to?.type==="Parental Leave")return<span className="tag tag-parental">👶</span>;
    return<span className="tag tag-jiffy">🌟</span>;
  }
  return<span className="tag tag-dayoff">—</span>;
}

// ── TODAY TAB ────────────────────────────────────────────────────────────────
function TodayTab({agents}){
  // find which week contains DISPLAY_DATE
  const todayDateStr2 = TODAY_STR;
  const weekForToday = WEEKS.find(w=>w.dates.includes(todayDateStr2)) || WEEKS[4];
  const weekDates = weekForToday.dates;

  const active=getActiveAgents(agents);
  const working=[],pto=[],halfDay=[],wfh=[],inOffice=[];
  active.forEach(a=>{
    const s=getCellStatus(a,TODAY_DAY,weekDates);
    if(s.type==="dayoff"||s.type==="departed"||s.type==="notstarted")return;
    if(s.type==="pto"){pto.push({agent:a,to:s.to});return;}
    if(s.type==="half"){halfDay.push({agent:a,to:s.to});return;}
    if(s.type==="office"){inOffice.push(a);working.push(a);}
    if(s.type==="wfh"){wfh.push(a);working.push(a);}
  });

  const CHAT_DAY_KEYS=["Mon","Tue","Wed","Thu","Fri"];
  const todayKey=CHAT_DAY_KEYS[["Monday","Tuesday","Wednesday","Thursday","Friday"].indexOf(TODAY_DAY)]||"Mon";
  const chatCounts = getChatIntervalCounts(todayKey);
  const chatPrimary=chatAgents.filter(a=>a[todayKey]==="X").length;
  const chatBackup=chatAgents.filter(a=>a[todayKey]==="B").length;
  const chatRiskIntervals=chatCounts.filter(r=>r.total>0&&r.total<CHAT_MIN_STAFFING);

  const expected=active.filter(a=>a.workDays.includes(TODAY_DAY)&&!hasNotStarted(a,TODAY_STR)).length;
  const actual=working.length+halfDay.length;
  const pct=expected>0?Math.round(actual/expected*100):100;
  const risk=pct<70?"HIGH":pct<85?"MEDIUM":"OK";
  const starting7=agents.filter(a=>{if(!a.startDate)return false;const sd=parseDate(a.startDate);const diff=(sd-REAL_TODAY)/(1000*60*60*24);return diff>=0&&diff<=7;});
  const shiftGroups={};working.forEach(a=>{const sh=getAgentForDate(a,TODAY_STR).shift;shiftGroups[sh]=(shiftGroups[sh]||0)+1;});
  const todayLabel=DISPLAY_DATE.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});

  return(
    <div>
      <div style={{background:"linear-gradient(135deg,#1e293b,#334155)",borderRadius:16,padding:"20px 24px",color:"#fff",marginBottom:24}}>
        <div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Daily Briefing{IS_SUNDAY?" — Showing Monday":""}  </div>
        <div style={{fontSize:22,fontWeight:800}}>{todayLabel}</div>
        <div style={{fontSize:13,color:"#94a3b8",marginTop:4}}>{active.length} active agents on roster</div>
        <div style={{marginTop:14,display:"flex",gap:10,flexWrap:"wrap"}}>
          <span className={`tag tag-${risk==="HIGH"?"risk":risk==="MEDIUM"?"warn":"ok"}`} style={{fontSize:13,padding:"4px 12px"}}>{risk==="HIGH"?"🔴 HIGH RISK":risk==="MEDIUM"?"🟡 MEDIUM RISK":"🟢 STAFFING OK"}</span>
          <span className="tag" style={{background:"#ffffff22",color:"#fff",fontSize:13,padding:"4px 12px"}}>{pct}% coverage</span>
          {chatRiskIntervals.length>0&&<span className="tag tag-risk" style={{fontSize:13,padding:"4px 12px"}}>💬 Chat Risk: {chatRiskIntervals.length} intervals below {CHAT_MIN_STAFFING}</span>}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:24}}>
        {[["👥","Working",working.length,`+${halfDay.length} half`,""],["🏢","In Office",inOffice.length,"","ok-card"],["🏠","WFH",wfh.length,"",""],["🌟","Out / PTO",pto.length,"",pto.length>3?"risk-card":""],["💬","Chat Primary",chatPrimary,`+${chatBackup} backup`,chatRiskIntervals.length>0?"risk-card":""]].map(([icon,label,val,sub,cls])=>(
          <div key={label} className={`card ${cls}`} style={{textAlign:"center",padding:"16px 10px"}}>
            <div style={{fontSize:22}}>{icon}</div>
            <div style={{fontSize:28,fontWeight:800,color:"#1e293b",margin:"4px 0"}}>{val}</div>
            <div style={{fontSize:12,fontWeight:700,color:"#475569"}}>{label}</div>
            {sub&&<div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{sub}</div>}
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:24}}>
        <div className="card">
          <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>🌟 Out Today</div>
          {pto.length===0&&halfDay.length===0?<p style={{fontSize:12,color:"#94a3b8"}}>No time off ✓</p>
          :[...pto,...halfDay].map((item,i)=>{const c=SUP_COLORS[item.agent.supervisor]||{bg:"#64748b"};return(
            <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #f1f5f9"}}>
              <div><div style={{fontWeight:600,fontSize:12}}>{item.agent.name}</div><div style={{fontSize:11,color:c.bg}}>{item.agent.supervisor}</div></div>
              <div>{item.to?.half?<span className="tag tag-half">½ {item.to.type==="Vacation"?"Vac":"Jiffy"}</span>:item.to?.type==="Vacation"?<span className="tag tag-vacation">✈️ Vacation</span>:item.to?.type==="Parental Leave"?<span className="tag tag-parental">👶 Parental</span>:<span className="tag tag-jiffy">🌟 Jiffy Day</span>}</div>
            </div>);})}
        </div>
        <div className="card">
          <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>🏢 In Office ({inOffice.length})</div>
          {inOffice.length===0?<p style={{fontSize:12,color:"#94a3b8"}}>No in-office agents</p>
          :inOffice.map((a,i)=>{const c=SUP_COLORS[a.supervisor]||{bg:"#64748b"};return(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #f1f5f9"}}>
              <div style={{fontWeight:600,fontSize:12}}>{a.name}</div>
              <div style={{fontSize:11,color:c.bg}}>{getAgentForDate(a,TODAY_STR).shift}</div>
            </div>);})}
        </div>
      </div>

      <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>⚠️ Risks & Alerts</div>
      <div style={{display:"grid",gap:10,marginBottom:24}}>
        {risk!=="OK"&&<div className={`card ${risk==="HIGH"?"risk-card":"warn-card"}`}><div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{risk==="HIGH"?"🔴 Staffing Risk":"🟡 Coverage Watch"}</div><p style={{fontSize:12,color:"#475569"}}>Working headcount ({working.length}) is {100-pct}% below expected ({expected} scheduled).{pto.length>0?` ${pto.length} agent${pto.length>1?"s":""} out on PTO.`:""}</p></div>}
        {chatRiskIntervals.length>0&&(
          <div className="card risk-card">
            <div style={{fontWeight:700,fontSize:13,marginBottom:6}}>💬 Chat Staffing Risk — below {CHAT_MIN_STAFFING} agents</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {chatRiskIntervals.map((r,i)=><span key={i} style={{background:"#fee2e2",color:"#991b1b",padding:"2px 8px",borderRadius:12,fontSize:11,fontWeight:600}}>{r.label} ({r.total})</span>)}
            </div>
            <p style={{fontSize:11,color:"#94a3b8",marginTop:6}}>Minimum threshold: {CHAT_MIN_STAFFING} agents per interval.</p>
          </div>
        )}
        {starting7.length>0&&<div className="card ok-card"><div style={{fontWeight:700,fontSize:13,marginBottom:6}}>✨ Starting This Week</div>{starting7.map(a=><div key={a.id} style={{fontSize:12,padding:"3px 0",display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600}}>{a.name}</span><span style={{color:"#059669"}}>Starts: {fmtFull(a.startDate)} · {a.supervisor}</span></div>)}</div>}
        {risk==="OK"&&chatRiskIntervals.length===0&&<div className="card ok-card"><div style={{fontWeight:700,fontSize:13}}>✅ All Clear</div><p style={{fontSize:12,color:"#475569",marginTop:4}}>No major staffing risks today.</p></div>}
      </div>

      <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>👤 By Supervisor</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}}>
        {SUPERVISORS.map(sup=>{
          const c=SUP_COLORS[sup]||{bg:"#64748b"};
          const team=working.filter(a=>a.supervisor===sup);
          const teamPTO=pto.filter(i=>i.agent.supervisor===sup);
          return(<div key={sup} className="card" style={{borderLeft:`4px solid ${c.bg}`}}>
            <div style={{fontWeight:700,fontSize:13,color:c.bg,marginBottom:8}}>{sup}</div>
            <div style={{display:"flex",gap:16,fontSize:12}}>
              <div><span style={{fontWeight:700,fontSize:18,color:"#1e293b"}}>{team.length}</span><div style={{color:"#94a3b8"}}>working</div></div>
              <div><span style={{fontWeight:700,fontSize:18,color:"#ef4444"}}>{teamPTO.length}</span><div style={{color:"#94a3b8"}}>out</div></div>
            </div>
            {teamPTO.length>0&&<div style={{marginTop:6,fontSize:11,color:"#64748b"}}>{teamPTO.map(i=>i.agent.name).join(", ")} out</div>}
          </div>);
        })}
      </div>
    </div>
  );
}

// ── SCHEDULE TAB ─────────────────────────────────────────────────────────────
function ScheduleTab({agents,setAgents,isManager}){
  const[weekIdx,setWeekIdx]=useState(4);
  const[filterSup,setFilterSup]=useState("All");
  const[search,setSearch]=useState("");
  const[editAgent,setEditAgent]=useState(null);
  const[delConfirm,setDelConfirm]=useState(null);
  const[saved,setSaved]=useState(false);
  const week=WEEKS[weekIdx];
  const persist=a=>{setAgents(a);saveAgents(a);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const weekStart=parseDate(week.dates[0]),weekEnd=parseDate(week.dates[5]);
  const weekAgents=getWeekAgents(agents,week);
  const base=weekAgents.filter(a=>(filterSup==="All"||a.supervisor===filterSup)&&(!search||a.name.toLowerCase().includes(search.toLowerCase())));
  const enriched=base.map(a=>({...a,_status:getStatus(a,weekStart)}));
  const{sorted,SortTh}=useSortableData(enriched,"name");
  const supCounts=SUPERVISORS.map(sup=>({sup,count:weekAgents.filter(a=>a.supervisor===sup).length})).filter(s=>s.count>0);
  const daySummary=DAYS.map((day,di)=>{
    let w=0,p=0,h=0;
    weekAgents.forEach(a=>{const s=getCellStatus(a,day,week.dates);if(s.type==="pto")p++;else if(s.type==="half")h++;else if(s.type==="office"||s.type==="wfh")w++;});
    return{day,date:week.dates[di],working:w,pto:p,half:h};
  });
  const changesThisWeek=Object.entries(SCHEDULE_CHANGES).filter(([,chg])=>{const eff=parseDate(chg.effectiveDate);return eff&&eff>=weekStart&&eff<=weekEnd;});
  return(
    <div>
      {saved&&<div style={{background:"#dcfce7",color:"#166534",padding:"8px 14px",borderRadius:8,marginBottom:12,fontSize:12,fontWeight:600}}>✓ Saved</div>}

          );})}</div>
        </div>
      );})}</div>
      {changesThisWeek.length>0&&<div style={{background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#92400e",marginBottom:10}}>📅 <strong>Schedule changes take effect this week:</strong> {changesThisWeek.map(([n])=>n).join(", ")} — new shift/days apply from Mar 30.</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8,marginBottom:20}}>
        {daySummary.map(d=>(
          <div key={d.day} style={{background:"#fff",borderRadius:10,border:"1px solid #e2e8f0",padding:"10px 8px",textAlign:"center"}}>
            <div style={{fontWeight:700,fontSize:12,color:"#475569"}}>{d.day.slice(0,3)}</div>
            <div style={{fontSize:10,color:"#94a3b8",marginBottom:4}}>{fmtShort(d.date)}</div>

            {d.pto>0&&<div style={{marginTop:2}}><span className="tag tag-vacation" style={{fontSize:10}}>{d.pto} out</span></div>}
          </div>
        ))}

      <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Filter by Supervisor</div>

                const ea=getAgentForDate(agent,week.dates[0]);
                const c=SUP_COLORS[agent.supervisor]||{bg:"#64748b"};

                return(<tr key={agent.id} style={{borderBottom:"1px solid #f1f5f9",background:hasPto?"#fffbeb":agent.isNew?"#f0fdf4":"#fff"}}>

                    {agent.isNew&&<span style={{marginRight:4}}>✨</span>}{agent.name}
                    {hasChg&&<span className="tag tag-changed" style={{marginLeft:6,fontSize:10}}>📅 Mar 30</span>}
                    {agent.lastDay&&<span style={{marginLeft:6,fontSize:10,background:"#fee2e2",color:"#991b1b",padding:"1px 5px",borderRadius:10,fontWeight:600}}>Last: {fmtShort(agent.lastDay)}</span>}
                  </td>
                  <td style={{fontSize:11,color:"#64748b"}}>{ea.shift}</td>
                  <td><span style={{fontSize:11,fontWeight:600,color:c.bg}}>{agent.supervisor}</span></td>

                  {isManager&&<td style={{textAlign:"center"}}>
                    <button className="btn btn-ghost" style={{fontSize:11,padding:"3px 8px",marginRight:4}} onClick={()=>setEditAgent(agent)}>✏️</button>
                    <button className="btn btn-danger" style={{fontSize:11,padding:"3px 8px"}} onClick={()=>setDelConfirm(agent.id)}>🗑</button>
                  </td>}
                </tr>);
              })}
            </tbody>
          </table>
        </div>
      </div>
      <p style={{fontSize:11,color:"#94a3b8",marginTop:6}}>{sorted.length} agents shown</p>
      {editAgent&&<RosterEditModal agent={editAgent} onSave={form=>{form.id?persist(agents.map(a=>a.id===form.id?form:a)):persist([...agents,{...form,id:Math.max(0,...agents.map(a=>a.id))+1}]);setEditAgent(null);}} onClose={()=>setEditAgent(null)}/>}
      {delConfirm&&<div className="modal-overlay" onClick={()=>setDelConfirm(null)}><div className="modal" style={{width:340}} onClick={e=>e.stopPropagation()}>
        <h2 style={{fontWeight:700,fontSize:16,marginBottom:8}}>Remove Agent?</h2>
        <p style={{fontSize:13,color:"#64748b",marginBottom:20}}>Remove <strong>{agents.find(a=>a.id===delConfirm)?.name}</strong>?</p>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button className="btn btn-ghost" onClick={()=>setDelConfirm(null)}>Cancel</button><button className="btn btn-danger" onClick={()=>{persist(agents.filter(a=>a.id!==delConfirm));setDelConfirm(null);}}>Remove</button></div>
      </div></div>}
    </div>
  );
}

// ── CHAT TAB ─────────────────────────────────────────────────────────────────
const CHAT_INTERVALS_ALL=[];
for(let m=360;m<=1200;m+=30){const h=Math.floor(m/60),mn=m%60;CHAT_INTERVALS_ALL.push({label:`${String(h).padStart(2,"0")}:${String(mn).padStart(2,"0")}`,minutes:m});}
const CHAT_DAY_KEYS=["Mon","Tue","Wed","Thu","Fri","Sat"];
const CHAT_DAY_FULL={Mon:"Monday",Tue:"Tuesday",Wed:"Wednesday",Thu:"Thursday",Fri:"Friday",Sat:"Saturday"};

function ChatScheduleTab(){
  const[dayKey,setDayKey]=useState("Mon");
  const[showBackups,setShowBackups]=useState(true);
  const[expanded,setExpanded]=useState(false);
  const[search,setSearch]=useState("");
  const[sortKey,setSortKey]=useState("startMin");
  const[sortDir,setSortDir]=useState("asc");
  function pShift(s){const p=s.split("-");return{startMin:timeToMin(p[0]),endMin:timeToMin(p[1])};}
  function reqSort(k){setSortDir(d=>sortKey===k?(d==="asc"?"desc":"asc"):"asc");setSortKey(k);}
  function SortTh({colKey,children,style={}}){const active=sortKey===colKey;return<th className={`sortable${active?" "+sortDir:""}`} onClick={()=>reqSort(colKey)} style={style}>{children}<span className="sort-icon"/></th>;}

  const winStart = expanded ? CHAT_EXPANDED_START : CHAT_STANDARD_START;
  const winEnd   = expanded ? CHAT_EXPANDED_END   : CHAT_STANDARD_END;

  // For agent list: show agents whose shift overlaps the current window on the selected day
  const dayAgents = chatAgents.filter(a=>{
    const role = a[dayKey];
    if(!role || (!showBackups && role==="B")) return false;
    if(search && !a.name.toLowerCase().includes(search.toLowerCase())) return false;
    // only show if their shift overlaps the window
    const{startMin,endMin}=pShift(a.shift);
    return startMin < winEnd && endMin > winStart;
  });

  const iCounts=getChatIntervalCounts(dayKey, expanded);
  const maxT=Math.max(...iCounts.map(r=>r.total),1);
  const rows=dayAgents.map(a=>{const{startMin,endMin}=pShift(a.shift);const mid=Math.round((startMin+endMin)/2/30)*30;return{name:a.name,shift:a.shift.replace("-","–"),role:a[dayKey],lunch:`${minToTime(mid)}–${minToTime(mid+30)}`,startMin,endMin};});
  const sortedRows=[...rows].sort((a,b)=>{let av=a[sortKey],bv=b[sortKey];if(typeof av==="string"){av=av.toLowerCase();bv=bv.toLowerCase();}return sortDir==="asc"?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);});
  const allDC=CHAT_DAY_KEYS.map(dk=>getChatIntervalCounts(dk, expanded));

  const winLabel = expanded ? "6:00 am – 8:00 pm" : "8:00 am – 6:00 pm";

  return(
    <div>
      {/* Header bar */}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,flexWrap:"wrap"}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:15}}>💬 Chat Coverage</div>
          <div style={{fontSize:11,color:"#64748b",marginTop:2}}>
            {expanded
              ? <span style={{color:"#7c3aed",fontWeight:600}}>🔭 Expanded view: 6:00 am – 8:00 pm (potential hours)</span>
              : <span style={{color:"#059669",fontWeight:600}}>✅ Standard hours: 8:00 am – 6:00 pm</span>}
          </div>
        </div>
        <button onClick={()=>setExpanded(e=>!e)} className="btn" style={{background:expanded?"#7c3aed":"#f5f3ff",color:expanded?"#fff":"#7c3aed",border:`2px solid ${expanded?"#7c3aed":"#c4b5fd"}`,fontWeight:700}}>
          {expanded?"📊 Standard Hours (8am–6pm)":"🔭 Expanded Hours (6am–8pm)"}
        </button>
      </div>

      {expanded&&(
        <div style={{background:"#f5f3ff",border:"1px solid #c4b5fd",borderRadius:8,padding:"8px 14px",fontSize:12,color:"#5b21b6",marginBottom:12}}>
          🔭 <strong>Expanded view</strong> — showing potential coverage if chat ran 6am–8pm. Intervals outside standard hours (before 8am or after 6pm) are shown with a purple tint. Not-yet-trained agents (Rylie, Lybah, Jada, Rachel, Taylor, Ariashe) are excluded.
        </div>
      )}

      <div style={{background:"#fff5f5",border:"1px solid #fca5a5",borderRadius:8,padding:"8px 14px",fontSize:12,color:"#991b1b",marginBottom:12,fontWeight:600}}>
        🔴 Risk threshold: fewer than {CHAT_MIN_STAFFING} agents in any interval.
      </div>

      {/* Day + controls row */}
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        {CHAT_DAY_KEYS.map(d=>{
          const dc=getChatIntervalCounts(d, expanded);
          const hasRisk=dc.some(r=>r.total>0&&r.total<CHAT_MIN_STAFFING);
          return<button key={d} onClick={()=>setDayKey(d)} className="btn" style={{background:dayKey===d?"#4f46e5":"#fff",color:dayKey===d?"#fff":"#475569",border:`2px solid ${dayKey===d?"#4f46e5":hasRisk?"#ef4444":"#e2e8f0"}`}}>{CHAT_DAY_FULL[d]}{hasRisk&&<span style={{marginLeft:4}}>🔴</span>}</button>;
        })}
        <button onClick={()=>setShowBackups(b=>!b)} className="btn" style={{marginLeft:"auto",background:showBackups?"#e0e7ff":"#fff",color:showBackups?"#4f46e5":"#475569",border:`1px solid ${showBackups?"#a5b4fc":"#e2e8f0"}`}}>{showBackups?"✓ Backups":"Backups"}</button>
      </div>
      <div style={{marginBottom:16}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search agent…" style={{maxWidth:220}}/></div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:24}}>
        {/* Agent list */}
        <div>
          <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>👥 {CHAT_DAY_FULL[dayKey]} — {winLabel}</div>
          <div style={{borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden",background:"#fff"}}>
            <table><thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
              <SortTh colKey="name">Agent</SortTh>
              <SortTh colKey="shift" style={{textAlign:"center"}}>Shift</SortTh>
              <SortTh colKey="role" style={{textAlign:"center"}}>Role</SortTh>
              <SortTh colKey="lunch" style={{textAlign:"center"}}>Lunch</SortTh>
            </tr></thead>
            <tbody>
              {sortedRows.length===0&&<tr><td colSpan={4} style={{textAlign:"center",color:"#94a3b8",padding:20}}>No agents</td></tr>}
              {sortedRows.map((a,i)=>{
                const{startMin,endMin}=pShift(chatAgents.find(c=>c.name===a.name)?.shift||"8:00-16:30");
                const outsideStd=(startMin<CHAT_STANDARD_START||endMin>CHAT_STANDARD_END)&&expanded;
                return(<tr key={i} style={{borderBottom:"1px solid #f1f5f9",background:outsideStd?"#faf5ff":a.role==="B"?"#fafafa":"#fff"}}>
                  <td style={{fontWeight:600,fontSize:12}}>{a.name}{outsideStd&&<span style={{marginLeft:4,fontSize:10,color:"#7c3aed"}}>↔</span>}</td>
                  <td style={{textAlign:"center",fontSize:11,color:"#64748b"}}>{a.shift}</td>
                  <td style={{textAlign:"center"}}>{a.role==="X"?<span className="tag tag-primary">Primary</span>:<span className="tag tag-backup">Backup</span>}</td>
                  <td style={{textAlign:"center"}}><span className="tag tag-lunch">🍽 {a.lunch}</span></td>
                </tr>);
              })}
            </tbody></table>
            {sortedRows.length>0&&<div style={{padding:"6px 12px",background:"#f8fafc",fontSize:11,color:"#94a3b8"}}>{sortedRows.filter(a=>a.role==="X").length} primary · {sortedRows.filter(a=>a.role==="B").length} backup</div>}
          </div>
        </div>

        {/* Interval headcount */}
        <div>
          <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>📊 Headcount by Interval</div>
          <div style={{borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden",background:"#fff"}}>
            <table><thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
              <th style={{width:65,fontWeight:600,color:"#64748b"}}>Time</th>
              <th style={{fontWeight:600,color:"#64748b"}}>Coverage</th>
              <th style={{width:45,textAlign:"center",fontWeight:600,color:"#1d4ed8"}}>Pri</th>
              {showBackups&&<th style={{width:45,textAlign:"center",fontWeight:600,color:"#6b7280"}}>Bkp</th>}
              <th style={{width:45,textAlign:"center",fontWeight:600}}>Tot</th>
            </tr></thead>
            <tbody>{iCounts.map((row,i)=>{
              const isRisk=row.total>0&&row.total<CHAT_MIN_STAFFING;
              const outsideStd=expanded&&(row.minutes<CHAT_STANDARD_START||row.minutes>=CHAT_STANDARD_END);
              const pct=row.total/maxT,pP=row.total>0?row.pri/row.total:0;
              return(<tr key={i} style={{borderBottom:"1px solid #f8fafc",background:outsideStd?"#faf5ff":isRisk?"#fff5f5":""}}>
                <td style={{fontWeight:600,fontSize:11,color:isRisk?"#991b1b":outsideStd?"#7c3aed":"#475569"}}>{row.label}{isRisk?" 🔴":outsideStd?" ↔":""}</td>
                <td style={{padding:"3px 8px"}}><div style={{position:"relative",height:14,background:"#f1f5f9",borderRadius:3,overflow:"hidden"}}>
                  <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pct*100}%`,background:isRisk?"#fca5a5":outsideStd?"#c4b5fd":"#93c5fd",borderRadius:3}}/>
                  <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pct*pP*100}%`,background:isRisk?"#ef4444":outsideStd?"#7c3aed":"#4f46e5",borderRadius:3}}/>
                </div></td>
                <td style={{textAlign:"center",fontWeight:700,fontSize:12,color:row.pri>0?"#4f46e5":"#e2e8f0"}}>{row.pri||"–"}</td>
                {showBackups&&<td style={{textAlign:"center",fontWeight:600,fontSize:12,color:row.bkp>0?"#6b7280":"#e2e8f0"}}>{row.bkp||"–"}</td>}
                <td style={{textAlign:"center",fontWeight:700,fontSize:12,color:isRisk?"#991b1b":row.total>0?"#1e293b":"#e2e8f0"}}>{row.total||"–"}</td>
              </tr>);})}
            </tbody></table>
          </div>
        </div>
      </div>

      {/* Heatmap */}
      <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>📅 All Days Heatmap — {winLabel}</div>
      <div style={{overflowX:"auto",borderRadius:12,border:"1px solid #e2e8f0"}}>
        <table><thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
          <th style={{minWidth:65,position:"sticky",left:0,background:"#f8fafc"}}>Time</th>
          {CHAT_DAY_KEYS.map(d=><th key={d} style={{textAlign:"center",minWidth:90}}>{CHAT_DAY_FULL[d]}</th>)}
        </tr></thead>
        <tbody>{CHAT_INTERVALS_ALL.filter(r=>r.minutes>=winStart&&r.minutes<winEnd).map(({label,minutes},ri)=>{
          const dc=allDC.map(d=>d.find(r=>r.minutes===minutes)||{pri:0,bkp:0,total:0});
          if(dc.every(c=>c.total===0))return null;
          const outsideStd=expanded&&(minutes<CHAT_STANDARD_START||minutes>=CHAT_STANDARD_END);
          return(<tr key={ri} style={{borderBottom:"1px solid #f1f5f9",background:outsideStd?"#faf5ff":""}}>
            <td style={{fontWeight:600,fontSize:11,color:outsideStd?"#7c3aed":"#475569",position:"sticky",left:0,background:outsideStd?"#faf5ff":"#fff"}}>{label}{outsideStd&&" ↔"}</td>
            {dc.map((c,ci)=>{
              const isRisk=c.total>0&&c.total<CHAT_MIN_STAFFING;
              const bg=isRisk?"#fee2e2":outsideStd?(c.total===0?"#f5f3ff":c.total<4?"#ede9fe":c.total<8?"#c4b5fd":c.total<12?"#7c3aed":"#4c1d95"):c.total===0?"#f8fafc":c.total<4?"#dbeafe":c.total<8?"#93c5fd":c.total<12?"#3b82f6":"#1d4ed8";
              const tc=isRisk?"#991b1b":["#7c3aed","#4c1d95","#3b82f6","#1d4ed8"].includes(bg)?"#fff":"#1e293b";
              return<td key={ci} style={{textAlign:"center",background:bg,color:tc,fontWeight:700,fontSize:12,padding:"5px 4px"}} title={`${c.pri} pri, ${c.bkp} bkp`}>{c.total>0?c.total:"–"}</td>;
            })}
          </tr>);})}
        </tbody></table>
      </div>
    </div>
  );
}

// ── OVERVIEW TAB ─────────────────────────────────────────────────────────────
function OverviewTab({agents}){
  const[weekIdx,setWeekIdx]=useState(4);const[view,setView]=useState("all");const[dayFilter,setDayFilter]=useState("Monday");
  const week=WEEKS[weekIdx];
  const wAgents=getWeekAgents(agents,week);
  function buildData(agents,week){return INTERVALS.map(({label,minutes})=>{const row={label};DAYS.forEach(day=>{let total=0,office=0;agents.forEach(a=>{const dateS=week.dates[DAYS.indexOf(day)];const ea=getAgentForDate(a,dateS);const st=getCellStatus(a,day,week.dates);if(st.type==="dayoff"||st.type==="pto"||st.type==="departed"||st.type==="notstarted")return;const sh=SHIFT_TIMES[ea.shift];if(!sh)return;if(minutes>=sh.start&&minutes<sh.end){total++;if(st.type==="office")office++;}});row[day]={total,office};});return row;});}
  const data=buildData(wAgents,week);
  const maxT=Math.max(...data.map(r=>DAYS.reduce((m,d)=>Math.max(m,r[d].total),0)));
  const maxO=Math.max(...data.map(r=>DAYS.reduce((m,d)=>Math.max(m,r[d].office),0)));
  const tBg=(n,max)=>{if(!n)return"#f8fafc";const p=n/max;return p<0.3?"#dbeafe":p<0.6?"#93c5fd":p<0.85?"#3b82f6":"#1d4ed8";};
  const oBg=(n,max)=>{if(!n)return"#f8fafc";const p=n/max;return p<0.3?"#dcfce7":p<0.6?"#86efac":p<0.85?"#22c55e":"#15803d";};
  const tc=bg=>["#3b82f6","#1d4ed8","#22c55e","#15803d"].includes(bg)?"#fff":"#1e293b";
  return(
    <div>
      <div style={{marginBottom:16}}>{["February","March"].map(month=>{const mw=WEEKS.filter(w=>w.month===month);return(<div key={month} style={{marginBottom:8}}><div style={{fontSize:11,fontWeight:700,color:"#94a3b8",marginBottom:5,textTransform:"uppercase",letterSpacing:1}}>{month}</div><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{mw.map(w=>{const gi=WEEKS.indexOf(w);return(<button key={gi} onClick={()=>setWeekIdx(gi)} className="btn" style={{background:weekIdx===gi?"#4f46e5":"#fff",color:weekIdx===gi?"#fff":"#475569",border:`1px solid ${weekIdx===gi?"#4f46e5":"#e2e8f0"}`}}>{w.label} <span style={{opacity:.7,fontSize:11}}>({w.display})</span></button>);})}</div></div>);})}</div>
      <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
        {[["all","📊 All Days"],["single","📅 Single Day"]].map(([v,l])=><button key={v} onClick={()=>setView(v)} className="btn" style={{background:view===v?"#4f46e5":"#fff",color:view===v?"#fff":"#475569",border:`1px solid ${view===v?"#4f46e5":"#e2e8f0"}`}}>{l}</button>)}
        {view==="single"&&<select value={dayFilter} onChange={e=>setDayFilter(e.target.value)} style={{width:"auto",minWidth:120}}>{DAYS.map(d=><option key={d}>{d}</option>)}</select>}
      </div>
      {view==="all"&&(<>
        <div style={{marginBottom:20}}><div style={{fontWeight:700,fontSize:14,marginBottom:8}}>👥 Total Staffed</div>
          <div style={{overflowX:"auto",borderRadius:12,border:"1px solid #e2e8f0"}}><table style={{minWidth:600}}><thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}><th style={{minWidth:70,position:"sticky",left:0,background:"#f8fafc",zIndex:2}}>Time</th>{DAYS.map((d,i)=><th key={d} style={{textAlign:"center",minWidth:80}}><div>{d.slice(0,3)}</div><div style={{fontWeight:400,fontSize:10,color:"#94a3b8"}}>{fmtShort(week.dates[i])}</div></th>)}</tr></thead>
          <tbody>{data.map((row,ri)=><tr key={ri} style={{borderBottom:"1px solid #f1f5f9"}}><td style={{fontWeight:600,fontSize:11,color:"#475569",position:"sticky",left:0,background:"#fff",zIndex:1}}>{row.label}</td>{DAYS.map(day=>{const n=row[day].total,bg=tBg(n,maxT);return<td key={day} style={{textAlign:"center",background:bg,color:tc(bg),fontWeight:700,fontSize:13,padding:"5px 4px"}}>{n>0?n:"–"}</td>;})}</tr>)}</tbody></table></div></div>
        <div><div style={{fontWeight:700,fontSize:14,marginBottom:8}}>🏢 In Office</div>
          <div style={{overflowX:"auto",borderRadius:12,border:"1px solid #e2e8f0"}}><table style={{minWidth:600}}><thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}><th style={{minWidth:70,position:"sticky",left:0,background:"#f8fafc",zIndex:2}}>Time</th>{DAYS.map((d,i)=><th key={d} style={{textAlign:"center",minWidth:80}}><div>{d.slice(0,3)}</div><div style={{fontWeight:400,fontSize:10,color:"#94a3b8"}}>{fmtShort(week.dates[i])}</div></th>)}</tr></thead>
          <tbody>{data.map((row,ri)=><tr key={ri} style={{borderBottom:"1px solid #f1f5f9"}}><td style={{fontWeight:600,fontSize:11,color:"#475569",position:"sticky",left:0,background:"#fff",zIndex:1}}>{row.label}</td>{DAYS.map(day=>{const n=row[day].office,bg=oBg(n,maxO);return<td key={day} style={{textAlign:"center",background:bg,color:tc(bg),fontWeight:700,fontSize:13,padding:"5px 4px"}}>{n>0?n:"–"}</td>;})}</tr>)}</tbody></table></div></div>
      </>)}
      {view==="single"&&(()=>{const sd=data.map(r=>({label:r.label,total:r[dayFilter].total,office:r[dayFilter].office}));const ms=Math.max(...sd.map(r=>r.total));return(<div style={{borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden",background:"#fff"}}><table><thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}><th>Time</th><th>Staffed</th><th style={{width:80,textAlign:"center"}}>Total</th><th style={{width:80,textAlign:"center"}}>Office</th></tr></thead><tbody>{sd.map((row,i)=>{const pT=ms>0?row.total/ms:0,pO=row.total>0?row.office/row.total:0;return(<tr key={i} style={{borderBottom:"1px solid #f8fafc"}}><td style={{fontWeight:600,fontSize:11,color:"#475569"}}>{row.label}</td><td style={{padding:"4px 8px"}}><div style={{position:"relative",height:18,background:"#f1f5f9",borderRadius:3,overflow:"hidden"}}><div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pT*100}%`,background:"#93c5fd",borderRadius:3}}/><div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pT*pO*100}%`,background:"#22c55e",borderRadius:3}}/></div></td><td style={{textAlign:"center",fontWeight:700,color:row.total>0?"#1d4ed8":"#cbd5e1"}}>{row.total||"–"}</td><td style={{textAlign:"center",fontWeight:700,color:row.office>0?"#15803d":"#cbd5e1"}}>{row.office||"–"}</td></tr>);})}</tbody></table></div>);})()}
    </div>
  );
}

// ── TIME OFF TAB ─────────────────────────────────────────────────────────────
function TimeOffTab({agents}){
  const[mf,setMf]=useState("All");const[nf,setNf]=useState("All");const[search,setSearch]=useState("");
  const names=["All",...[...new Set(timeOffData.map(r=>r.name))].sort()];
  const rm=r=>{const d=parseDate(r.start);return d?.getMonth()===1?"February":d?.getMonth()===2?"March":"Other";};
  const enriched=timeOffData.map(r=>{const sup=agents.find(a=>a.name===r.name)?.supervisor||"—";return{...r,_sup:sup,_month:rm(r),_startDate:parseDate(r.start)||new Date(0)};});
  const filtered=enriched.filter(r=>(mf==="All"||r._month===mf)&&(nf==="All"||r.name===nf)&&(!search||r.name.toLowerCase().includes(search.toLowerCase())||r.type.toLowerCase().includes(search.toLowerCase())));
  const{sorted,SortTh}=useSortableData(filtered,"_startDate");
  const febC=[...new Set(timeOffData.filter(r=>rm(r)==="February").map(r=>r.name))].length;
  const marC=[...new Set(timeOffData.filter(r=>rm(r)==="March").map(r=>r.name))].length;
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20,maxWidth:400}}>
        {[["February",febC],["March",marC]].map(([m,c])=>(
          <div key={m} onClick={()=>setMf(mf===m?"All":m)} style={{background:mf===m?"#eff6ff":"#fff",border:`2px solid ${mf===m?"#93c5fd":"#e2e8f0"}`,borderRadius:12,padding:"12px 16px",cursor:"pointer"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#3b82f6",marginBottom:4}}>{m}</div>
            <div style={{fontSize:26,fontWeight:800}}>{c}</div>
            <div style={{fontSize:11,color:"#94a3b8"}}>agents with time off</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search…" style={{maxWidth:200}}/>
        <select value={mf} onChange={e=>setMf(e.target.value)} style={{width:"auto",minWidth:120}}><option value="All">All months</option><option>February</option><option>March</option></select>
        <select value={nf} onChange={e=>setNf(e.target.value)} style={{width:"auto",minWidth:160}}>{names.map(n=><option key={n}>{n}</option>)}</select>
        <button className="btn btn-ghost" onClick={()=>{setMf("All");setNf("All");setSearch("");}}>Clear</button>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <span className="tag tag-vacation">✈️ Vacation</span><span className="tag tag-jiffy">🌟 Jiffy Day</span>
        <span className="tag tag-half">½ Half Day</span><span className="tag tag-parental">👶 Parental Leave</span>
      </div>
      <div style={{borderRadius:12,overflow:"hidden",border:"1px solid #e2e8f0"}}>
        <table><thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
          <SortTh colKey="name" style={{minWidth:160}}>Agent</SortTh>
          <SortTh colKey="type">Type</SortTh>
          <SortTh colKey="_startDate">Dates</SortTh>
          <SortTh colKey="duration" style={{textAlign:"center"}}>Days</SortTh>
          <th>Status</th>
          <SortTh colKey="_sup">Supervisor</SortTh>
        </tr></thead>
        <tbody>
          {sorted.length===0&&<tr><td colSpan={6} style={{textAlign:"center",color:"#94a3b8",padding:24}}>No records</td></tr>}
          {sorted.map((r,i)=>{const c=SUP_COLORS[r._sup]||{bg:"#64748b"};return(
            <tr key={i} style={{borderBottom:"1px solid #f1f5f9",background:r.note?"#fffbeb":"#fff"}}>
              <td style={{fontWeight:600}}>{r.name}</td>
              <td>{r.half?<span className="tag tag-half">½ {r.type}</span>:r.type==="Vacation"?<span className="tag tag-vacation">✈️ Vacation</span>:r.type==="Parental Leave"?<span className="tag tag-parental">👶 Parental</span>:<span className="tag tag-jiffy">🌟 Jiffy</span>}</td>
              <td style={{color:"#475569",whiteSpace:"nowrap"}}>{r.start===r.end?fmtShort(r.start):`${fmtShort(r.start)}–${fmtShort(r.end)}`}</td>
              <td style={{textAlign:"center",color:"#64748b"}}>{r.duration}</td>
              <td><span style={{fontSize:11,color:r.note?"#854d0e":"#059669",fontWeight:600}}>{r.note||"Approved"}</span></td>
              <td><span style={{fontSize:11,fontWeight:600,color:c.bg}}>{r._sup}</span></td>
            </tr>);})}
        </tbody></table>
      </div>
      <p style={{fontSize:11,color:"#94a3b8",marginTop:6}}>{sorted.length} records.</p>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const[agents,setAgents]=useState(loadAgents);
  const[isManager,setIsManager]=useState(false);
  const[showLogin,setShowLogin]=useState(false);
  const[tab,setTab]=useState("today");
  const[rosterUnlocked,setRosterUnlocked]=useState(false);
  const[showRosterLogin,setShowRosterLogin]=useState(false);
  const activeCount=useMemo(()=>getActiveAgents(agents).length,[agents]);
  function handleTabClick(t){if(t==="roster"&&!rosterUnlocked){setShowRosterLogin(true);return;}setTab(t);}
  return(
    <div style={{minHeight:"100vh",background:"#f8fafc"}}>
      <div style={{background:"#1e293b",color:"#fff",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 8px #0003"}}>
        <div>
          <div style={{fontWeight:700,fontSize:18}}>📋 Customer Solutions — Team Hub</div>
          <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>Feb – Mar 2026 · {activeCount} active agents</div>
        </div>
        <div>{isManager?<button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>{setIsManager(false);setRosterUnlocked(false);}}>🔒 Lock</button>:<button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>setShowLogin(true)}>🔑 Manager Login</button>}</div>
      </div>
      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 24px",display:"flex",gap:4,overflowX:"auto"}}>
        <button className={`nav-tab${tab==="today"?" active":""}`}    onClick={()=>handleTabClick("today")}>🌅 Today</button>
        <button className={`nav-tab${tab==="roster"?" active":""}`}   onClick={()=>handleTabClick("roster")}>👥 Roster {!rosterUnlocked&&<span style={{fontSize:10,marginLeft:4,opacity:.6}}>🔒</span>}</button>
        <button className={`nav-tab${tab==="overview"?" active":""}`} onClick={()=>handleTabClick("overview")}>📊 Overview</button>
        <button className={`nav-tab${tab==="schedule"?" active":""}`} onClick={()=>handleTabClick("schedule")}>📅 Schedule</button>
        <button className={`nav-tab${tab==="chat"?" active":""}`}     onClick={()=>handleTabClick("chat")}>💬 Chat</button>
        <button className={`nav-tab${tab==="timeoff"?" active":""}`}  onClick={()=>handleTabClick("timeoff")}>🏖️ Time Off</button>
      </div>
      <div style={{padding:"20px 24px",maxWidth:1300,margin:"0 auto"}}>
        {tab==="today"   &&<TodayTab agents={agents}/>}
        {tab==="roster"  &&rosterUnlocked&&<RosterTab agents={agents} setAgents={setAgents}/>}
        {tab==="overview"&&<OverviewTab agents={agents}/>}
        {tab==="schedule"&&<ScheduleTab agents={agents} setAgents={setAgents} isManager={isManager}/>}
        {tab==="chat"    &&<ChatScheduleTab/>}
        {tab==="timeoff" &&<TimeOffTab agents={agents}/>}
      </div>
      {showLogin&&<LoginModal onLogin={()=>{setIsManager(true);setRosterUnlocked(true);setShowLogin(false);setTab("today");}} onClose={()=>setShowLogin(false)}/>}
      {showRosterLogin&&<LoginModal onLogin={()=>{setRosterUnlocked(true);setIsManager(true);setShowRosterLogin(false);setTab("roster");}} onClose={()=>setShowRosterLogin(false)}/>}
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
