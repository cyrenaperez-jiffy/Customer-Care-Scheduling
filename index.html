<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Schedule View</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:#0f1117;color:#e2e8f0;font-size:13px;min-height:100vh}

  .header{background:#161b27;border-bottom:1px solid #2d3348;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
  .header-title{font-size:16px;font-weight:700;color:#f1f5f9;letter-spacing:-0.3px}
  .header-sub{font-size:11px;color:#64748b;font-family:'DM Mono',monospace;margin-top:2px}

  .tabs{display:flex;border-bottom:1px solid #2d3348;background:#161b27;padding:0 24px}
  .tab{padding:12px 20px;font-size:11px;font-weight:700;cursor:pointer;color:#64748b;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;letter-spacing:0.5px;text-transform:uppercase;transition:all .15s}
  .tab.active{color:#60a5fa;border-bottom-color:#60a5fa}
  .tab:hover:not(.active){color:#94a3b8}

  .content{padding:20px 24px}

  /* Controls */
  .controls{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .search-input{background:#161b27;border:1px solid #2d3348;border-radius:6px;padding:7px 10px;color:#e2e8f0;font-size:12px;font-family:'DM Sans',sans-serif;width:200px;outline:none}
  .search-input:focus{border-color:#60a5fa}
  .search-input::placeholder{color:#475569}
  .filter-select{background:#161b27;border:1px solid #2d3348;border-radius:6px;padding:7px 10px;color:#e2e8f0;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
  .filter-select:focus{border-color:#60a5fa}
  .count-badge{font-family:'DM Mono',monospace;font-size:11px;color:#475569;margin-left:auto}

  /* Table */
  .table-wrap{border:1px solid #2d3348;border-radius:10px;overflow:auto}
  table{width:100%;border-collapse:collapse;min-width:900px}
  thead{position:sticky;top:0;z-index:10}
  th{background:#1a1f2e;padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.6px;border-bottom:1px solid #2d3348;white-space:nowrap;user-select:none;cursor:pointer;transition:background .1s}
  th:hover{background:#1e2644;color:#94a3b8}
  th.sort-asc,th.sort-desc{color:#60a5fa;background:#1a2640}
  .sort-icon{margin-left:4px;font-size:9px}
  th.sort-asc  .sort-icon::after{content:"▲"}
  th.sort-desc .sort-icon::after{content:"▼"}
  th:not(.sort-asc):not(.sort-desc) .sort-icon::after{content:"⇅";opacity:.4}

  td{padding:7px 12px;border-bottom:1px solid #1a1f2e;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#161b27}

  .agent-name{font-weight:600;color:#f1f5f9;font-size:12px;white-space:nowrap}
  .shift-mono{font-family:'DM Mono',monospace;font-size:10px;color:#475569;white-space:nowrap}
  .sup-name{font-size:11px;font-weight:600;white-space:nowrap}

  /* Day badges */
  .day-cell{text-align:center}
  .badge{display:inline-flex;align-items:center;justify-content:center;padding:3px 9px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap;min-width:58px;letter-spacing:0.2px}
  .b-office{background:#0f2d4a;color:#60a5fa;border:1px solid #1e4d7a}
  .b-wfh   {background:#0f2d1e;color:#4ade80;border:1px solid #1a4d30}
  .b-off   {background:transparent;color:#2d3348;border:1px solid #1e2333}
  .b-train {background:#0f2730;color:#38bdf8;border:1px solid #1e4d5a}

  /* Capacity tab */
  .section-label{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #2d3348}
  .cap-wrap{border:1px solid #2d3348;border-radius:10px;overflow:hidden;margin-bottom:24px}
  .cap-head{background:#1a1f2e;padding:10px 14px;border-bottom:1px solid #2d3348;display:flex;justify-content:space-between;align-items:center}
  .cap-head-title{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px}
  .limit-note{font-family:'DM Mono',monospace;font-size:11px;color:#475569}
  .limit-chip{background:#2d3348;padding:1px 6px;border-radius:3px;color:#94a3b8}

  .cap-table{width:100%;border-collapse:collapse}
  .cap-table th{background:#1a1f2e;padding:8px 12px;text-align:left;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid #2d3348;white-space:nowrap}
  .cap-table th.c{text-align:center}
  .cap-table td{padding:6px 12px;border-bottom:1px solid #1a1f2e;font-size:12px}
  .cap-table tr:last-child td{border-bottom:none}
  .cap-table tr:hover td{background:#161b27}

  .mono{font-family:'DM Mono',monospace}
  .c{text-align:center}
  .num-ok  {color:#4ade80;font-weight:600}
  .num-warn{color:#fbbf24;font-weight:600}
  .num-over{color:#f87171;font-weight:600}
  .num-dim {color:#334155}

  .peak-chip{display:inline-block;padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px;font-weight:700}
  .chip-ok  {background:#0f2d1e;color:#4ade80;border:1px solid #1a4d30}
  .chip-warn{background:#2d2500;color:#fbbf24;border:1px solid #4d3d00}
  .chip-over{background:#2d0f0f;color:#f87171;border:1px solid #4d1a1a}

  .bar-wrap{height:12px;background:#1e2333;border-radius:2px;overflow:hidden;min-width:60px}
  .bar-fill{height:100%;border-radius:2px}
  .fill-ok  {background:#1e4d3a}
  .fill-warn{background:#4d3d1e}
  .fill-over{background:#4d1e1e}

  .hidden{display:none}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">📅 Customer Solutions — Schedule View</div>
    <div class="header-sub">Feb – Apr 2026 · Texas</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('weekly')">Weekly Schedule</button>
  <button class="tab" onclick="switchTab('capacity')">Office Capacity</button>
</div>

<div class="content">

<!-- WEEKLY TAB -->
<div id="tab-weekly">
  <div class="controls">
    <input class="search-input" type="text" placeholder="🔍  Search agent…" oninput="applyFilters()" id="srch"/>
    <select class="filter-select" id="sup-f" onchange="applyFilters()">
      <option value="">All Supervisors</option>
      <option>Ainsley Reynolds</option>
      <option>Alex Blair</option>
      <option>Angy Chang</option>
      <option>Lauren Montanye</option>
      <option>Neyat Abraha</option>
      <option>Shelby Coldiron</option>
    </select>
    <select class="filter-select" id="shift-f" onchange="applyFilters()">
      <option value="">All Shifts</option>
      <option>6:00–2:30</option>
      <option>8:00–4:30</option>
      <option>9:00–5:30</option>
      <option>10:30–8:00</option>
      <option>11:30–8:00</option>
    </select>
    <span class="count-badge" id="agent-count"></span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr id="thead-row"></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- CAPACITY TAB -->
<div id="tab-capacity" class="hidden">
  <div class="cap-wrap">
    <div class="cap-head">
      <span class="cap-head-title">Peak In-Office by Day</span>
      <span class="limit-note">Seat limit: <span class="limit-chip">22</span></span>
    </div>
    <table class="cap-table">
      <thead><tr>
        <th>Day</th><th>Peak Time</th><th class="c">Peak Count</th><th>Status</th>
      </tr></thead>
      <tbody id="peak-body"></tbody>
    </table>
  </div>

  <div class="cap-wrap">
    <div class="cap-head">
      <span class="cap-head-title">In-Office Count by 30-min Interval</span>
      <span class="limit-note">🟡 ≥20 · 🔴 over <span class="limit-chip">22</span></span>
    </div>
    <table class="cap-table">
      <thead><tr>
        <th>Time</th>
        <th class="c">Mon</th><th class="c">Tue</th><th class="c">Wed</th>
        <th class="c">Thu</th><th class="c">Fri</th><th class="c">Sat</th>
        <th style="min-width:120px">Mon bar</th>
      </tr></thead>
      <tbody id="interval-body"></tbody>
    </table>
  </div>
</div>

</div><!-- /content -->

<script>

  "Ainsley Reynolds":"#0ea5e9","Alex Blair":"#d97706","Angy Chang":"#0d9488",
  "Lauren Montanye":"#059669","Neyat Abraha":"#7c3aed","Shelby Coldiron":"#db2777"
};
const DAYS=["Mon","Tue","Wed","Thu","Fri","Sat"];
const COLS=[
  {key:"name",  label:"Agent"},
  {key:"shift", label:"Shift"},
  {key:"sup",   label:"Supervisor"},
  ...DAYS.map(d=>({key:d,label:d,isDay:true}))
];

const AGENTS=[
  {name:"Asia Campbell",       sup:"Ainsley Reynolds",shift:"10:30–8:00",days:["Mon","Tue","Wed","Thu","Sat"],office:["Tue","Wed","Thu"],wfh:["Sat","Mon"]},
  {name:"Michael Chavez",      sup:"Alex Blair",      shift:"6:00–2:30", days:["Mon","Tue","Wed","Thu","Fri"],office:["Mon","Thu"],      wfh:["Tue","Wed","Fri"]},
  {name:"Sam De Castro",       sup:"Alex Blair",      shift:"6:00–2:30", days:["Mon","Tue","Wed","Thu","Fri"],office:["Wed","Thu"],      wfh:["Mon","Tue","Fri"]},
  {name:"Damian Doubrava",     sup:"Alex Blair",      shift:"8:00–4:30", days:["Mon","Wed","Thu","Fri","Sat"],office:["Mon","Thu","Fri"],wfh:["Sat","Wed"]},
  {name:"Eri Dotson",          sup:"Alex Blair",      shift:"8:00–4:30", days:["Mon","Tue","Wed","Fri","Sat"],office:["Mon","Tue","Wed"],wfh:["Sat","Fri"]},
  {name:"Preston Panetti",     sup:"Alex Blair",      shift:"8:00–4:30", days:["Mon","Tue","Thu","Fri","Sat"],office:["Mon","Tue","Fri"],wfh:["Sat","Thu"]},
  {name:"Andre Cordero",       sup:"Alex Blair",      shift:"9:00–5:30", days:["Mon","Tue","Wed","Thu","Fri"],office:["Mon","Tue","Wed","Thu","Fri"],wfh:[]},
  {name:"Denia Bradley",       sup:"Alex Blair",      shift:"11:30–8:00",days:["Tue","Wed","Thu","Fri","Sat"],office:["Wed","Thu","Fri"],wfh:["Sat","Tue"]},
  // Angy Chang — Erick Garcia Cardenas removed (never started), Rylie Walker removed (offboarded 3/9)
  {name:"Brianna Miller",      sup:"Angy Chang",      shift:"9:00–5:30", days:["Mon","Tue","Wed","Thu","Fri"],office:["Mon","Tue","Wed","Thu","Fri"],wfh:[],isNew:true},
  {name:"Salia Kibibi",        sup:"Angy Chang",      shift:"9:00–5:30", days:["Mon","Tue","Wed","Thu","Fri"],office:["Mon","Tue","Wed","Thu","Fri"],wfh:[],isNew:true},
  {name:"Vitria Pinkston",     sup:"Angy Chang",      shift:"9:00–5:30", days:["Mon","Tue","Wed","Thu","Fri"],office:["Mon","Tue","Wed","Thu","Fri"],wfh:[],isNew:true},
  {name:"Unaisa Aslam",        sup:"Lauren Montanye", shift:"8:00–4:30", days:["Mon","Tue","Wed","Fri","Sat"],office:["Mon","Tue","Wed"],wfh:["Sat","Fri"]},
  {name:"Amber Bailey",        sup:"Lauren Montanye", shift:"8:00–4:30", days:["Mon","Tue","Wed","Thu","Fri"],office:["Mon","Tue","Wed","Thu","Fri"],wfh:[]},
  {name:"Bo Repko",            sup:"Lauren Montanye", shift:"6:00–2:30", days:["Mon","Tue","Wed","Thu","Fri"],office:["Mon","Tue","Wed","Thu","Fri"],wfh:[]},
  {name:"Enrico Davis",        sup:"Lauren Montanye", shift:"11:30–8:00",days:["Mon","Tue","Wed","Thu","Fri"],office:["Mon","Tue","Wed","Thu","Fri"],wfh:[]},
  {name:"Ariashe Lowery",      sup:"Lauren Montanye", shift:"9:00–5:30", days:["Mon","Tue","Wed","Thu","Fri"],office:["Mon","Tue","Wed","Thu","Fri"],wfh:[]},
  {name:"Rachel Dunlap",       sup:"Lauren Montanye", shift:"9:00–5:30", days:["Mon","Tue","Wed","Thu","Fri"],office:["Mon","Tue","Wed","Thu","Fri"],wfh:[]},
  {name:"Taylor Amos",         sup:"Lauren Montanye", shift:"9:00–5:30", days:["Mon","Tue","Wed","Thu","Fri"],office:["Mon","Tue","Wed","Thu","Fri"],wfh:[]},
  {name:"Rosa Nuno",           sup:"Neyat Abraha",    shift:"6:00–2:30", days:["Tue","Wed","Thu","Fri","Sat"],office:["Tue","Wed","Thu"],wfh:["Sat","Fri"]},
  {name:"Ramila Chaulagain",   sup:"Neyat Abraha",    shift:"8:00–4:30", days:["Mon","Tue","Wed","Thu","Sat"],office:["Wed","Thu"],      wfh:["Mon","Tue","Fri","Sat"]},
  {name:"Sarah Al-Obaidi",     sup:"Neyat Abraha",    shift:"8:00–4:30", days:["Mon","Tue","Wed","Thu","Fri"],office:["Mon","Thu","Fri"],wfh:["Tue","Wed"]},
  {name:"Servando Morales",    sup:"Neyat Abraha",    shift:"8:00–4:30", days:["Mon","Tue","Wed","Thu","Fri"],office:["Mon","Thu","Fri"],wfh:["Tue","Wed"]},
  {name:"Zhane Alexander",     sup:"Neyat Abraha",    shift:"9:00–5:30", days:["Mon","Tue","Wed","Thu","Fri"],office:["Mon","Tue","Wed"],wfh:["Thu","Fri"]},
  {name:"Chisa Ordu",          sup:"Neyat Abraha",    shift:"11:30–8:00",days:["Mon","Tue","Wed","Thu","Fri"],office:["Mon","Tue","Fri"],wfh:["Wed","Thu"]},
  {name:"Jeremy Carillo",      sup:"Neyat Abraha",    shift:"11:30–8:00",days:["Mon","Wed","Thu","Fri","Sat"],office:["Mon","Thu","Fri"],wfh:["Sat","Wed"]},
  {name:"Jessie Gregory",      sup:"Neyat Abraha",    shift:"11:30–8:00",days:["Mon","Tue","Wed","Thu","Fri"],office:["Tue","Wed","Thu"],wfh:["Mon","Fri"]},
  {name:"Ananya SenthilKumar", sup:"Shelby Coldiron", shift:"6:00–2:30", days:["Mon","Tue","Wed","Fri","Sat"],office:["Mon","Tue","Wed"],wfh:["Sat","Fri"]},
  {name:"Bianca Vernando",     sup:"Shelby Coldiron", shift:"6:00–2:30", days:["Mon","Tue","Thu","Fri","Sat"],office:["Mon","Tue","Fri"],wfh:["Sat","Thu"]},
  {name:"Chassidy Williams",   sup:"Shelby Coldiron", shift:"6:00–2:30", days:["Mon","Tue","Wed","Thu","Fri"],office:["Mon","Tue","Fri"],wfh:["Wed","Thu"]},
  {name:"Michael Nguyen",      sup:"Shelby Coldiron", shift:"6:00–2:30", days:["Tue","Wed","Thu","Fri","Sat"],office:["Tue","Wed","Fri"],wfh:["Sat","Thu"]},
  {name:"Morgan Lankford",     sup:"Shelby Coldiron", shift:"6:00–2:30", days:["Mon","Wed","Thu","Fri","Sat"],office:["Mon","Wed","Thu"],wfh:["Sat","Fri"]},
  {name:"Cristie Avant",       sup:"Shelby Coldiron", shift:"8:00–4:30", days:["Mon","Tue","Wed","Thu","Fri"],office:["Wed","Thu","Fri"],wfh:["Mon","Tue"]},
  {name:"Sarah Hajali",        sup:"Shelby Coldiron", shift:"9:00–5:30", days:["Mon","Tue","Wed","Thu","Fri"],office:["Mon","Tue","Wed","Thu","Fri"],wfh:[]},
  {name:"Balrupe Purewal",     sup:"Shelby Coldiron", shift:"11:30–8:00",days:["Mon","Tue","Wed","Thu","Fri"],office:["Wed","Thu","Fri"],wfh:["Mon","Tue"]},
  {name:"Blanca Berumen",      sup:"Shelby Coldiron", shift:"11:30–8:00",days:["Mon","Tue","Thu","Fri","Sat"],office:["Mon","Tue","Fri"],wfh:["Sat","Thu"]},
];

const OFFICE_DATA=[
  ["06:00",5,3,3,4,3,2],["06:30",5,3,3,4,3,2],
  ["07:00",5,3,3,4,3,2],["07:30",5,3,3,4,3,2],
  ["08:00",9,7,7,8,7,3],["08:30",9,7,7,8,7,3],
  ["09:00",23,18,18,20,19,4],["09:30",23,18,18,20,19,4],
  ["10:00",23,18,18,20,19,4],["10:30",23,19,19,21,19,5],
  ["11:00",23,19,19,21,19,5],["11:30",27,23,23,26,25,6],
  ["12:00",27,23,23,26,25,6],["12:30",27,23,23,26,25,6],
  ["13:00",27,23,23,26,25,6],["13:30",27,23,23,26,25,6],
  ["14:00",27,23,23,26,25,6],["14:30",22,19,19,22,22,4],
  ["15:00",22,19,19,22,22,4],["15:30",22,19,19,22,22,4],
  ["16:00",22,19,19,22,22,4],["16:30",18,15,15,18,18,2],
  ["17:00",18,15,15,18,18,2],["17:30",4,5,5,6,6,1],
  ["18:00",4,5,5,6,6,1],["18:30",4,5,5,6,6,1],
  ["19:00",4,5,5,6,6,1],["19:30",4,5,5,6,6,1],
];
const LIMIT=22;

// ── schedule table ─────────────────────────────────────────────────────────

let sortCol="name", sortDir="asc", filtered=[...AGENTS];

function dayVal(a,d){
  if(!a.days.includes(d))return 0;
  if(a.isNew)return 4;
  if(a.office.includes(d))return 3;
  if(a.wfh.includes(d))return 2;
  return 1;
}
function dayBadge(a,d){
  if(!a.days.includes(d))return'<span class="badge b-off">Off</span>';
  if(a.isNew)            return'<span class="badge b-train">Training</span>';
  if(a.office.includes(d))return'<span class="badge b-office">🏢 Office</span>';
  if(a.wfh.includes(d))  return'<span class="badge b-wfh">🏠 WFH</span>';
  return'<span class="badge b-off">Off</span>';
}

function buildHeader(){
  const tr=document.getElementById('thead-row');
  COLS.forEach(c=>{
    const th=document.createElement('th');
    if(c.isDay)th.classList.add('day-cell');
    th.id='th-'+c.key;
    th.innerHTML=c.label+'<span class="sort-icon"></span>';
    th.onclick=()=>doSort(c.key);
    tr.appendChild(th);
  });
}

function doSort(col){
  if(sortCol===col) sortDir=sortDir==='asc'?'desc':'asc';
  else{sortCol=col;sortDir='asc';}
  render();
}

function applyFilters(){
  const s=document.getElementById('srch').value.toLowerCase();
  const sup=document.getElementById('sup-f').value;
  const shift=document.getElementById('shift-f').value;
  filtered=AGENTS.filter(a=>
    (!s||a.name.toLowerCase().includes(s))&&
    (!sup||a.sup===sup)&&
    (!shift||a.shift===shift)
  );
  render();
}

function render(){
  // header sort classes
  COLS.forEach(c=>{
    const th=document.getElementById('th-'+c.key);
    if(!th)return;
    th.className=(c.isDay?'day-cell ':'')+(sortCol===c.key?(sortDir==='asc'?'sort-asc':'sort-desc'):'');
  });

  const rows=[...filtered].sort((a,b)=>{
    let av,bv;
    if(DAYS.includes(sortCol)){av=dayVal(a,sortCol);bv=dayVal(b,sortCol);}
    else if(sortCol==='name'){av=a.name.toLowerCase();bv=b.name.toLowerCase();}
    else if(sortCol==='sup') {av=a.sup.toLowerCase();bv=b.sup.toLowerCase();}
    else if(sortCol==='shift'){av=a.shift;bv=b.shift;}
    if(av<bv)return sortDir==='asc'?-1:1;
    if(av>bv)return sortDir==='asc'?1:-1;
    return 0;
  });

  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  rows.forEach(a=>{
    const c=SUP_COLORS[a.sup]||'#64748b';
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><span class="agent-name">${a.name}</span></td>
      <td><span class="shift-mono">${a.shift}</span></td>
      <td><span class="sup-name" style="color:${c}">${a.sup}</span></td>
      ${DAYS.map(d=>`<td class="day-cell">${dayBadge(a,d)}</td>`).join('')}
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('agent-count').textContent=`${rows.length} agent${rows.length!==1?'s':''}`;
}

// ── capacity ───────────────────────────────────────────────────────────────

function buildCapacity(){
  const dayFull=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  // peak table
  const peakBody=document.getElementById('peak-body');
  DAYS.forEach((d,di)=>{
    const vals=OFFICE_DATA.map(r=>r[di+1]);
    const peak=Math.max(...vals);
    const time=OFFICE_DATA[vals.indexOf(peak)][0];
    const over=peak>LIMIT, warn=peak>LIMIT-3&&!over;
    const chip=over?'chip-over':warn?'chip-warn':'chip-ok';
    const status=over?'🔴 Over limit':warn?'🟡 Near limit':'🟢 OK';
    peakBody.innerHTML+=`<tr>
      <td style="font-weight:600;color:#f1f5f9">${dayFull[di]}</td>
      <td class="mono" style="color:#94a3b8">${time}</td>
      <td class="c"><span class="peak-chip ${chip}">${peak}</span></td>
      <td style="font-size:11px;font-weight:600;color:${over?'#f87171':warn?'#fbbf24':'#4ade80'}">${status}</td>
    </tr>`;
  });

  // interval table
  const maxVal=Math.max(...OFFICE_DATA.flatMap(r=>r.slice(1)));
  const iBody=document.getElementById('interval-body');
  OFFICE_DATA.forEach(row=>{
    const nums=row.slice(1);
    const cells=nums.map(v=>{
      if(v===0)return`<td class="c num-dim">—</td>`;
      const over=v>LIMIT,warn=v>LIMIT-3&&!over;
      return`<td class="c ${over?'num-over':warn?'num-warn':'num-ok'}">${v}</td>`;
    }).join('');
    const monV=nums[0];
    const pct=(monV/maxVal)*100;
    const over=monV>LIMIT,warn=monV>LIMIT-3&&!over;
    const fill=over?'fill-over':warn?'fill-warn':'fill-ok';
    iBody.innerHTML+=`<tr>
      <td class="mono" style="color:#64748b;font-size:11px">${row[0]}</td>
      ${cells}
      <td style="padding:6px 12px"><div class="bar-wrap"><div class="bar-fill ${fill}" style="width:${pct}%"></div></div></td>
    </tr>`;
  });
}

function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['weekly','capacity'][i]===id));
  document.getElementById('tab-weekly').classList.toggle('hidden',id!=='weekly');
  document.getElementById('tab-capacity').classList.toggle('hidden',id!=='capacity');
}
