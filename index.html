function parseDate(s){
  if(!s)return null;
  const p=s.split("/");if(p.length<3)return null;
  const yr=parseInt(p[2])<100?2000+parseInt(p[2]):parseInt(p[2]);
  return new Date(yr,parseInt(p[0])-1,parseInt(p[1]));
}
function dateStr(d){return`${d.getMonth()+1}/${d.getDate()}/${String(d.getFullYear()).slice(-2)}`;}
function fmtShort(s){const d=parseDate(s);return d?d.toLocaleDateString("en-US",{month:"short",day:"numeric"}):s;}
function dateRange(start,end){
  const dates=[];let d=new Date(parseDate(start));const e=parseDate(end);
  while(d<=e){dates.push(dateStr(new Date(d)));d.setDate(d.getDate()+1);}
  return dates;
}
function getTimeOff(name,dateS){
  return timeOffData.find(r=>r.name===name&&dateRange(r.start,r.end).includes(dateS))||null;
}
function getAgentForDate(agent,dateS){
  if(agent.name==="Unaisa Aslam"){
    const d=parseDate(dateS);const cutoff=new Date(2026,2,19);
    if(d&&d>=cutoff) return{...agent,shift:"11:30–8:00"};
  }
  return agent;
}
function getCellStatus(agent,day,weekDates){
  const dateS=weekDates[DAYS.indexOf(day)];
  const effectiveAgent=getAgentForDate(agent,dateS);
  if(!agent.workDays.includes(day)) return{type:"dayoff",dateS,shift:effectiveAgent.shift};
  const to=getTimeOff(agent.name,dateS);
  if(to) return{type:to.half?"half":"pto",label:to.type,dateS,to,shift:effectiveAgent.shift};
  return{type:agent.officeDays.includes(day)?"office":"wfh",dateS,shift:effectiveAgent.shift};
}
function agentActiveAtInterval(agent,day,intervalMin,weekDates){
  const dateS=weekDates[DAYS.indexOf(day)];
  const effectiveAgent=getAgentForDate(agent,dateS);
  const status=getCellStatus(agent,day,weekDates);
  if(status.type==="dayoff"||status.type==="pto") return{active:false,inOffice:false};
  const st=SHIFT_TIMES[effectiveAgent.shift];
  if(!st) return{active:false,inOffice:false};
  const active=intervalMin>=st.start&&intervalMin<st.end;
  return{active,inOffice:active&&status.type==="office"};
}

  return INTERVALS.map(({label,minutes})=>{
    const row={label};
    DAYS.forEach(day=>{
      let total=0,office=0;
      agents.forEach(a=>{const{active,inOffice}=agentActiveAtInterval(a,day,minutes,week.dates);if(active)total++;if(inOffice)office++;});
      row[day]={total,office};
    });
    return row;
  });
}

function CellTag({status}){
  if(status.type==="dayoff")  return <span className="tag tag-dayoff">—</span>;
  if(status.type==="office")  return <span className="tag tag-office">🏢 Office</span>;
  if(status.type==="wfh")     return <span className="tag tag-wfh">🏠 WFH</span>;
  if(status.type==="half")    return <span className="tag tag-half">½ {status.to?.type==="Vacation"?"Vac":"Jiffy"}</span>;
  if(status.type==="pto"){
    if(status.to?.type==="Vacation")       return <span className="tag tag-vacation">✈️ Vacation</span>;
    if(status.to?.type==="Parental Leave") return <span className="tag tag-parental">👶 Parental</span>;
    return <span className="tag tag-jiffy">🌟 Jiffy Day</span>;
  }
  return <span className="tag tag-dayoff">—</span>;
}

function ChatScheduleTab(){
  const[dayKey,setDayKey]=useState("Mon");
  const[showBackups,setShowBackups]=useState(true);

  // Agents active on selected day
  const dayAgents = chatAgents.filter(a => a[dayKey]==="X" || (showBackups && a[dayKey]==="B"));

  // Parse shift string "H:MM-HH:MM" into start/end minutes
  function parseShift(shiftStr){
    const parts = shiftStr.split("-");
    return {startMin: timeToMin(parts[0]), endMin: timeToMin(parts[1])};
  }

  // Build interval headcount
  const intervalCounts = CHAT_INTERVALS
    .filter(({minutes}) => minutes >= 360 && minutes < 1200)
    .map(({label, minutes}) => {
      let primary=0, backup=0;
      chatAgents.forEach(a => {
        const {startMin, endMin} = parseShift(a.shift);
        if(minutes >= startMin && minutes < endMin){
          if(a[dayKey]==="X") primary++;
          else if(a[dayKey]==="B") backup++;
        }
      });
      return {label, minutes, primary, backup, total: primary+backup};
    });

  // Suggested lunch: midpoint of shift, rounded to nearest 30 min
  const agentRows = dayAgents.map(a => {
    const {startMin, endMin} = parseShift(a.shift);
    const mid = Math.round((startMin + endMin) / 2 / 30) * 30;
    const lunchEnd = mid + 30;
    return {
      name: a.name,
      shift: a.shift.replace("-","–"),
      role: a[dayKey],
      lunchLabel: `${minToTime(mid)}–${minToTime(lunchEnd)}`,
      startMin,
    };
  }).sort((a,b) => a.startMin - b.startMin);

  const maxTotal = Math.max(...intervalCounts.map(r=>r.total), 1);

  // Summary heatmap across all days
  const allDayCounts = CHAT_DAY_KEYS.map(dk => {
    return CHAT_INTERVALS
      .filter(({minutes}) => minutes>=360 && minutes<1200)
      .map(({label,minutes}) => {
        let pri=0,bkp=0;
        chatAgents.forEach(a=>{
          const {startMin,endMin}=parseShift(a.shift);
          if(minutes>=startMin&&minutes<endMin){
            if(a[dk]==="X") pri++;
            else if(a[dk]==="B") bkp++;
          }
        });
        return{label,minutes,pri,bkp,total:pri+bkp};
      });
  });

  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:12,fontWeight:600,color:"#64748b"}}>Day:</span>
        {CHAT_DAY_KEYS.map(d=>(
          <button key={d} onClick={()=>setDayKey(d)} className="btn"
            style={{background:dayKey===d?"#4f46e5":"#fff",color:dayKey===d?"#fff":"#475569",border:`1px solid ${dayKey===d?"#4f46e5":"#e2e8f0"}`}}>
            {CHAT_DAY_FULL[d]}
          </button>
        ))}
        <button onClick={()=>setShowBackups(!showBackups)} className="btn"
          style={{marginLeft:"auto",background:showBackups?"#e0e7ff":"#fff",color:showBackups?"#4f46e5":"#475569",border:`1px solid ${showBackups?"#a5b4fc":"#e2e8f0"}`}}>
          {showBackups?"✓ Backups Shown":"Show Backups"}
        </button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:24}}>
        {/* Agent list */}
        <div>
          <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>💬 {CHAT_DAY_FULL[dayKey]} — Chat Agents</div>
          <div style={{borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden",boxShadow:"0 1px 4px #0001",background:"#fff"}}>
            <table>
              <thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
                <th>Agent</th>
                <th style={{textAlign:"center"}}>Shift</th>
                <th style={{textAlign:"center"}}>Role</th>
                <th style={{textAlign:"center"}}>Suggested Lunch</th>
              </tr></thead>
              <tbody>
                {agentRows.length===0 && (
                  <tr><td colSpan={4} style={{textAlign:"center",color:"#94a3b8",padding:24}}>No agents scheduled</td></tr>
                )}
                {agentRows.map((a,i)=>(
                  <tr key={i} style={{borderBottom:"1px solid #f1f5f9",background:a.role==="B"?"#fafafa":"#fff"}}>
                    <td style={{fontWeight:600,fontSize:12}}>{a.name}</td>
                    <td style={{textAlign:"center",fontSize:11,color:"#64748b"}}>{a.shift}</td>
                    <td style={{textAlign:"center"}}>
                      {a.role==="X"
                        ? <span className="tag tag-primary">Primary</span>
                        : <span className="tag tag-backup">Backup</span>}
                    </td>
                    <td style={{textAlign:"center"}}>
                      <span className="tag tag-lunch">🍽 {a.lunchLabel}</span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            {agentRows.length>0&&(
              <div style={{padding:"8px 14px",background:"#f8fafc",fontSize:11,color:"#94a3b8"}}>
                {agentRows.filter(a=>a.role==="X").length} primary · {agentRows.filter(a=>a.role==="B").length} backup
              </div>
            )}
          </div>
        </div>

        {/* Headcount by interval */}
        <div>
          <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>📊 Headcount by 30-min Interval</div>
          <div style={{borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden",boxShadow:"0 1px 4px #0001",background:"#fff"}}>
            <table>
              <thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
                <th style={{width:65,fontWeight:600,color:"#64748b"}}>Time</th>
                <th style={{fontWeight:600,color:"#64748b"}}>Coverage</th>
                <th style={{width:50,textAlign:"center",fontWeight:600,color:"#1d4ed8"}}>Pri</th>
                {showBackups&&<th style={{width:50,textAlign:"center",fontWeight:600,color:"#6b7280"}}>Bkp</th>}
                <th style={{width:50,textAlign:"center",fontWeight:600,color:"#1e293b"}}>Tot</th>
              </tr></thead>
              <tbody>
                {intervalCounts.map((row,i)=>{
                  const pct = row.total/maxTotal;
                  const pctP = row.total>0 ? row.primary/row.total : 0;
                  return(
                    <tr key={i} style={{borderBottom:"1px solid #f8fafc",background:row.total===0?"#fafafa":"#fff"}}>
                      <td style={{fontWeight:600,fontSize:11,color:"#475569"}}>{row.label}</td>
                      <td style={{padding:"4px 8px"}}>
                        <div style={{position:"relative",height:16,background:"#f1f5f9",borderRadius:4,overflow:"hidden"}}>
                          <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pct*100}%`,background:"#93c5fd",borderRadius:4}}/>
                          <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pct*pctP*100}%`,background:"#4f46e5",borderRadius:4}}/>
                        </div>
                      </td>
                      <td style={{textAlign:"center",fontWeight:700,fontSize:12,color:row.primary>0?"#4f46e5":"#e2e8f0"}}>{row.primary||"–"}</td>
                      {showBackups&&<td style={{textAlign:"center",fontWeight:600,fontSize:12,color:row.backup>0?"#6b7280":"#e2e8f0"}}>{row.backup||"–"}</td>}
                      <td style={{textAlign:"center",fontWeight:700,fontSize:12,color:row.total>0?"#1e293b":"#e2e8f0"}}>{row.total||"–"}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <div style={{padding:"8px 14px",background:"#f8fafc",display:"flex",gap:16,fontSize:11,color:"#64748b"}}>
              <span><span style={{display:"inline-block",width:10,height:10,background:"#4f46e5",borderRadius:2,marginRight:4,verticalAlign:"middle"}}/>Primary</span>
              <span><span style={{display:"inline-block",width:10,height:10,background:"#93c5fd",borderRadius:2,marginRight:4,verticalAlign:"middle"}}/>Backup</span>
            </div>
          </div>
        </div>
      </div>

      {/* All-days heatmap */}
      <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>📅 All Days — Chat Coverage Heatmap (Primary + Backup)</div>
      <div style={{overflowX:"auto",borderRadius:12,border:"1px solid #e2e8f0",boxShadow:"0 1px 4px #0001"}}>
        <table>
          <thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
            <th style={{minWidth:65,position:"sticky",left:0,background:"#f8fafc",zIndex:2}}>Time</th>
            {CHAT_DAY_KEYS.map(d=><th key={d} style={{textAlign:"center",minWidth:90}}>{CHAT_DAY_FULL[d]}</th>)}
          </tr></thead>
          <tbody>
            {CHAT_INTERVALS.filter(r=>r.minutes>=360&&r.minutes<1200).map(({label,minutes},ri)=>{
              const dayCounts = allDayCounts.map(dc => dc.find(r=>r.minutes===minutes)||{pri:0,bkp:0,total:0});
              const allZero = dayCounts.every(c=>c.total===0);
              if(allZero) return null;
              return(
                <tr key={ri} style={{borderBottom:"1px solid #f1f5f9"}}>
                  <td style={{fontWeight:600,fontSize:11,color:"#475569",position:"sticky",left:0,background:"#fff",zIndex:1}}>{label}</td>
                  {dayCounts.map((c,ci)=>{
                    const bg=c.total===0?"#f8fafc":c.total<4?"#dbeafe":c.total<8?"#93c5fd":c.total<12?"#3b82f6":"#1d4ed8";
                    const tc=["#3b82f6","#1d4ed8"].includes(bg)?"#fff":"#1e293b";
                    return(
                      <td key={ci} style={{textAlign:"center",background:bg,color:tc,fontWeight:700,fontSize:12,padding:"5px 4px"}}
                        title={`${CHAT_DAY_FULL[CHAT_DAY_KEYS[ci]]}: ${c.pri} primary, ${c.bkp} backup`}>
                        {c.total>0?c.total:"–"}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <p style={{fontSize:11,color:"#94a3b8",marginTop:6}}>Darker blue = more coverage. Hover cells for primary/backup breakdown.</p>
    </div>
  );
}

            <div style={{overflowX:"auto",borderRadius:12,border:"1px solid #e2e8f0",boxShadow:"0 1px 4px #0001"}}>
              <table style={{minWidth:600}}>
                <thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
                  <th style={{minWidth:70,position:"sticky",left:0,background:"#f8fafc",zIndex:2}}>Time</th>
                  {DAYS.map((d,i)=><th key={d} style={{textAlign:"center",minWidth:80}}><div>{d.slice(0,3)}</div><div style={{fontWeight:400,fontSize:10,color:"#94a3b8"}}>{fmtShort(week.dates[i])}</div></th>)}
                </tr></thead>
                <tbody>{data.map((row,ri)=>(
                  <tr key={ri} style={{borderBottom:"1px solid #f1f5f9"}}>
                    <td style={{fontWeight:600,fontSize:11,color:"#475569",position:"sticky",left:0,background:"#fff",zIndex:1}}>{row.label}</td>
                    {DAYS.map(day=>{const n=row[day].office;const bg=officeBg(n,maxOffice);const tc=textCol(bg);return<td key={day} style={{textAlign:"center",background:bg,color:tc,fontWeight:700,fontSize:13,padding:"5px 4px"}}>{n>0?n:"–"}</td>;})}
                  </tr>))}</tbody>
              </table>
            </div>
          </div>
        </>
      )}
      {view==="single"&&(
        <div>
          <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>📅 {dayFilter} — {fmtShort(week.dates[DAYS.indexOf(dayFilter)])}</div>
          <p style={{fontSize:12,color:"#64748b",marginBottom:16}}>Blue = total · Green = in office</p>
          <div style={{borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden",boxShadow:"0 1px 4px #0001",background:"#fff"}}>
            <table style={{width:"100%"}}>
              <thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
                <th style={{width:60,fontWeight:600,color:"#64748b"}}>Time</th>
                <th style={{fontWeight:600,color:"#64748b"}}>Staffed</th>
                <th style={{width:80,textAlign:"center",fontWeight:600,color:"#64748b"}}>Total</th>
                <th style={{width:80,textAlign:"center",fontWeight:600,color:"#64748b"}}>Office</th>
              </tr></thead>
              <tbody>{singleDayData.map((row,i)=>{
                const pT=maxSingle>0?row.total/maxSingle:0,pO=row.total>0?row.office/row.total:0;
                return(<tr key={i} style={{borderBottom:"1px solid #f8fafc"}}>
                  <td style={{fontWeight:600,fontSize:11,color:"#475569",whiteSpace:"nowrap"}}>{row.label}</td>
                  <td style={{padding:"4px 8px"}}>
                    <div style={{position:"relative",height:20,background:"#f1f5f9",borderRadius:4,overflow:"hidden"}}>
                      <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pT*100}%`,background:"#93c5fd",borderRadius:4}}/>
                      <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pT*pO*100}%`,background:"#22c55e",borderRadius:4}}/>
                    </div>
                  </td>
                  <td style={{textAlign:"center",fontWeight:700,color:row.total>0?"#1d4ed8":"#cbd5e1"}}>{row.total||"–"}</td>
                  <td style={{textAlign:"center",fontWeight:700,color:row.office>0?"#15803d":"#cbd5e1"}}>{row.office||"–"}</td>
                </tr>);
              })}</tbody>
            </table>
            <div style={{padding:"10px 16px",background:"#f8fafc",display:"flex",gap:16,fontSize:11,color:"#64748b"}}>
              <span><span style={{display:"inline-block",width:12,height:12,background:"#93c5fd",borderRadius:2,marginRight:4,verticalAlign:"middle"}}/>Total</span>
              <span><span style={{display:"inline-block",width:12,height:12,background:"#22c55e",borderRadius:2,marginRight:4,verticalAlign:"middle"}}/>In office</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ---- TIME OFF TAB ----
function TimeOffTab({agents}){
  const[monthFilter,setMonthFilter]=useState("All");
  const[nameFilter,setNameFilter]=useState("All");
  const names=["All",...[...new Set(timeOffData.map(r=>r.name))].sort()];
  function recordMonth(r){const d=parseDate(r.start);if(!d)return"";return d.getMonth()===1?"February":d.getMonth()===2?"March":"Other";}
  const filtered=timeOffData.filter(r=>(monthFilter==="All"||recordMonth(r)===monthFilter)&&(nameFilter==="All"||r.name===nameFilter));
  const febCount=[...new Set(timeOffData.filter(r=>recordMonth(r)==="February").map(r=>r.name))].length;
  const marCount=[...new Set(timeOffData.filter(r=>recordMonth(r)==="March").map(r=>r.name))].length;
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20,maxWidth:400}}>
        {[["February",febCount],["March",marCount]].map(([m,c])=>(
          <div key={m} onClick={()=>setMonthFilter(monthFilter===m?"All":m)}
            style={{background:monthFilter===m?"#eff6ff":"#fff",border:`2px solid ${monthFilter===m?"#93c5fd":"#e2e8f0"}`,borderRadius:12,padding:"12px 16px",cursor:"pointer"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#3b82f6",marginBottom:4}}>{m}</div>
            <div style={{fontSize:26,fontWeight:800,color:"#1e293b"}}>{c}</div>
            <div style={{fontSize:11,color:"#94a3b8"}}>agents with time off</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:140}}><select value={monthFilter} onChange={e=>setMonthFilter(e.target.value)}><option value="All">All months</option><option>February</option><option>March</option></select></div>
        <div style={{flex:1,minWidth:160}}><select value={nameFilter} onChange={e=>setNameFilter(e.target.value)}>{names.map(n=><option key={n}>{n}</option>)}</select></div>
        <button className="btn btn-ghost" onClick={()=>{setMonthFilter("All");setNameFilter("All");}}>Clear</button>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <span className="tag tag-vacation">✈️ Vacation</span>
        <span className="tag tag-jiffy">🌟 Jiffy Day</span>
        <span className="tag tag-half">½ Half Day</span>
        <span className="tag tag-parental">👶 Parental Leave</span>
      </div>
      <div style={{borderRadius:12,overflow:"hidden",border:"1px solid #e2e8f0",boxShadow:"0 1px 4px #0001"}}>
        <table>
          <thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
            <th style={{minWidth:160}}>Agent</th><th>Type</th><th>Dates</th><th style={{textAlign:"center"}}>Days</th><th>Status</th><th>Supervisor</th>
          </tr></thead>
          <tbody>
            {filtered.length===0&&<tr><td colSpan={6} style={{textAlign:"center",color:"#94a3b8",padding:24}}>No records found</td></tr>}
            {filtered.map((r,i)=>{
              const sup=agents.find(a=>a.name===r.name)?.supervisor||"—";
              const c=SUP_COLORS[sup]||{bg:"#64748b"};
              return(<tr key={i} style={{borderBottom:"1px solid #f1f5f9",background:r.note?"#fffbeb":"#fff"}}>
                <td style={{fontWeight:600}}>{r.name}</td>
                <td>{r.half?<span className="tag tag-half">½ {r.type}</span>:r.type==="Vacation"?<span className="tag tag-vacation">✈️ Vacation</span>:r.type==="Parental Leave"?<span className="tag tag-parental">👶 Parental</span>:<span className="tag tag-jiffy">🌟 Jiffy Day</span>}</td>
                <td style={{color:"#475569",whiteSpace:"nowrap"}}>{r.start===r.end?fmtShort(r.start):`${fmtShort(r.start)} – ${fmtShort(r.end)}`}</td>
                <td style={{textAlign:"center",color:"#64748b"}}>{r.duration}</td>
                <td><span style={{fontSize:11,color:r.note?"#854d0e":"#059669",fontWeight:600}}>{r.note||"Approved"}</span></td>
                <td><span style={{fontSize:11,fontWeight:600,color:c.bg}}>{sup}</span></td>
              </tr>);
            })}
          </tbody>
        </table>
      </div>
      <p style={{fontSize:11,color:"#94a3b8",marginTop:8}}>{filtered.length} record{filtered.length!==1?"s":""}. Canceled & rejected excluded.</p>
    </div>
  );
}

// ---- SCHEDULE TAB ----
function ScheduleTab({agents,setAgents,isManager}){
  const[weekIdx,setWeekIdx]=useState(4);
  const[filterSup,setFilterSup]=useState("All");
  const[filterNew,setFilterNew]=useState(false);
  const[editAgent,setEditAgent]=useState(null);
  const[showAdd,setShowAdd]=useState(false);
  const[delConfirm,setDelConfirm]=useState(null);
  const[saved,setSaved]=useState(false);
  const week=WEEKS[weekIdx];
  const persist=a=>{setAgents(a);saveAgents(a);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const handleSave=form=>{form.id?persist(agents.map(a=>a.id===form.id?form:a)):persist([...agents,{...form,id:Math.max(0,...agents.map(a=>a.id))+1}]);setEditAgent(null);setShowAdd(false);};
  const handleDel=id=>{persist(agents.filter(a=>a.id!==id));setDelConfirm(null);};
  const displayed=agents.filter(a=>(filterSup==="All"||a.supervisor===filterSup)&&(!filterNew||a.isNew));
  const grouped=SUPERVISORS.map(sup=>({sup,agents:displayed.filter(a=>a.supervisor===sup),total:agents.filter(a=>a.supervisor===sup).length})).filter(g=>g.agents.length>0);
  const daySummary=DAYS.map((day,di)=>{
    let working=0,pto=0,half=0,dayoff=0;
    agents.forEach(a=>{const s=getCellStatus(a,day,week.dates);if(s.type==="dayoff")dayoff++;else if(s.type==="pto")pto++;else if(s.type==="half")half++;else working++;});
    return{day,date:week.dates[di],working,pto,half,dayoff};
  });
  return(
    <div>
      {saved&&<div style={{background:"#dcfce7",color:"#166534",padding:"8px 14px",borderRadius:8,marginBottom:12,fontSize:12,fontWeight:600}}>✓ Saved</div>}
      <div style={{marginBottom:16}}>
        {["February","March"].map(month=>{
          const mWeeks=WEEKS.filter(w=>w.month===month);
          return(
            <div key={month} style={{marginBottom:8}}>
              <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",marginBottom:5,textTransform:"uppercase",letterSpacing:1}}>{month}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {mWeeks.map(w=>{const gi=WEEKS.indexOf(w);return(
                  <button key={gi} onClick={()=>setWeekIdx(gi)} className="btn" style={{background:weekIdx===gi?"#4f46e5":"#fff",color:weekIdx===gi?"#fff":"#475569",border:`1px solid ${weekIdx===gi?"#4f46e5":"#e2e8f0"}`}}>
                    {w.label} <span style={{opacity:.7,fontSize:11}}>({w.display})</span>
                  </button>);})}
              </div>
            </div>
          );
        })}
      </div>
      {week.month==="March"&&weekIdx>=5&&(
        <div style={{background:"#ffedd5",border:"1px solid #fdba74",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#9a3412",marginBottom:10,fontWeight:500}}>
          👶 <strong>Jeremy Carillo</strong> on Parental Leave Mar 16–31.
        </div>
      )}
      {week.month==="March"&&(weekIdx===6||weekIdx===7)&&(
        <div style={{background:"#ede9fe",border:"1px solid #c4b5fd",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#5b21b6",marginBottom:10,fontWeight:500}}>
          ✈️ <strong>Unaisa Aslam</strong> on Vacation Mar 18–29. Reverts to <strong>11:30–8:00</strong> from Mar 19.
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8,marginBottom:20}}>
        {daySummary.map(d=>(
          <div key={d.day} style={{background:"#fff",borderRadius:10,border:"1px solid #e2e8f0",padding:"10px 8px",textAlign:"center",boxShadow:"0 1px 3px #0001"}}>
            <div style={{fontWeight:700,fontSize:12,color:"#475569"}}>{d.day.slice(0,3)}</div>
            <div style={{fontSize:10,color:"#94a3b8",marginBottom:4}}>{fmtShort(d.date)}</div>
            <div style={{fontSize:22,fontWeight:800,color:"#1e293b"}}>{d.working+d.half}</div>
            <div style={{fontSize:10,color:"#94a3b8"}}>of {agents.length-d.dayoff} sched.</div>
            {d.pto>0&&<div style={{marginTop:3}}><span className="tag tag-vacation" style={{fontSize:10}}>{d.pto} off</span></div>}
            {d.half>0&&<div style={{marginTop:2}}><span className="tag tag-half" style={{fontSize:10}}>{d.half} half</span></div>}
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
        {SUPERVISORS.map(sup=>{const c=SUP_COLORS[sup];const t=agents.filter(a=>a.supervisor===sup).length;const n=agents.filter(a=>a.supervisor===sup&&a.isNew).length;return(
          <div key={sup} onClick={()=>setFilterSup(filterSup===sup?"All":sup)} style={{background:filterSup===sup?c.light:"#fff",border:`2px solid ${filterSup===sup?c.border:"#e2e8f0"}`,borderRadius:12,padding:"10px 14px",cursor:"pointer"}}>
            <div style={{fontSize:11,fontWeight:700,color:c.bg,marginBottom:2}}>{sup}</div>
            <div style={{fontSize:22,fontWeight:800,color:"#1e293b"}}>{t}</div>
            <div style={{fontSize:11,color:"#94a3b8"}}>{n>0?`${n} new`:""}</div>
          </div>);})}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <button className="btn btn-ghost" style={{background:filterSup==="All"?"#4f46e5":"",color:filterSup==="All"?"#fff":""}} onClick={()=>setFilterSup("All")}>All Teams</button>
        <button className="btn" style={{background:filterNew?"#fbbf24":"#f1f5f9",color:filterNew?"#fff":"#475569",border:"1px solid #e2e8f0"}} onClick={()=>setFilterNew(!filterNew)}>✨ New only</button>
        {isManager&&<button className="btn btn-success" style={{marginLeft:"auto"}} onClick={()=>setShowAdd(true)}>+ Add Agent</button>}
        <div style={{display:"flex",gap:6,fontSize:11,flexWrap:"wrap",alignItems:"center"}}>
          <span className="tag tag-office">🏢</span><span className="tag tag-wfh">🏠</span>
          <span className="tag tag-vacation">✈️</span><span className="tag tag-jiffy">🌟</span>
          <span className="tag tag-half">½</span><span className="tag tag-parental">👶</span>
          <span className="tag tag-dayoff">—</span>
        </div>
      </div>
      {grouped.map(({sup,agents:team,total})=>{const c=SUP_COLORS[sup];return(
        <div key={sup} style={{marginBottom:20,borderRadius:12,overflow:"hidden",border:"1px solid #e2e8f0",boxShadow:"0 1px 4px #0001"}}>
          <div style={{background:c.bg,color:"#fff",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{fontWeight:700,fontSize:14}}>{sup}</span><span style={{fontSize:12,opacity:.85}}>{total} agents</span>
          </div>
          <div style={{overflowX:"auto"}}>
            <table>
              <thead><tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
                <th style={{minWidth:155}}>Agent</th><th style={{minWidth:80}}>Shift</th>
                {DAYS.map((d,di)=><th key={d} style={{textAlign:"center",minWidth:90}}><div>{d.slice(0,3)}</div><div style={{fontWeight:400,color:"#94a3b8",fontSize:10}}>{fmtShort(week.dates[di])}</div></th>)}
                {isManager&&<th style={{textAlign:"center",minWidth:80}}>Actions</th>}
              </tr></thead>
              <tbody>
                {team.map(agent=>{
                  const hasAnyPto=DAYS.some(d=>{const s=getCellStatus(agent,d,week.dates);return s.type==="pto"||s.type==="half";});
                  const midDate=week.dates[2];
                  const effectiveShift=getAgentForDate(agent,midDate).shift;
                  return(
                    <tr key={agent.id} style={{borderBottom:"1px solid #f1f5f9",background:hasAnyPto?"#fffbeb":agent.isNew?"#f0fdf4":"#fff"}}>
                      <td style={{fontWeight:600}}>{agent.isNew&&<span style={{marginRight:4}}>✨</span>}{agent.name}</td>
                      <td style={{color:"#64748b",fontSize:11}}>
                        {effectiveShift}
                        {agent.name==="Unaisa Aslam"&&effectiveShift!==agent.shift&&<span style={{marginLeft:4,fontSize:10,color:"#5b21b6",fontWeight:600}}>(reverted)</span>}
                      </td>
                      {DAYS.map(day=>{const status=getCellStatus(agent,day,week.dates);return<td key={day} style={{textAlign:"center",padding:"6px 4px"}}><CellTag status={status}/></td>;})}
                      {isManager&&<td style={{textAlign:"center"}}>
                        <button className="btn btn-ghost" style={{fontSize:11,padding:"3px 8px",marginRight:4}} onClick={()=>setEditAgent(agent)}>✏️</button>
                        <button className="btn btn-danger" style={{fontSize:11,padding:"3px 8px"}} onClick={()=>setDelConfirm(agent.id)}>🗑</button>
                      </td>}
                    </tr>);
                })}
              </tbody>
            </table>
          </div>
        </div>);})}
      {(editAgent||showAdd)&&<EditModal agent={editAgent||{workDays:[],officeDays:[],wfhDays:[],shift:"6:00–2:30",supervisor:"Shelby Coldiron",isNew:true}} onSave={handleSave} onClose={()=>{setEditAgent(null);setShowAdd(false);}}/>}
      {delConfirm&&<div className="modal-overlay" onClick={()=>setDelConfirm(null)}><div className="modal" style={{width:340}} onClick={e=>e.stopPropagation()}>
        <h2 style={{fontWeight:700,fontSize:16,marginBottom:8}}>Remove Agent?</h2>
        <p style={{fontSize:13,color:"#64748b",marginBottom:20}}>Remove <strong>{agents.find(a=>a.id===delConfirm)?.name}</strong>?</p>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button className="btn btn-ghost" onClick={()=>setDelConfirm(null)}>Cancel</button><button className="btn btn-danger" onClick={()=>handleDel(delConfirm)}>Remove</button></div>
      </div></div>}
    </div>
  );
}

// ---- MAIN APP ----
function App(){
  const[agents,setAgents]=useState(loadAgents);
  const[isManager,setIsManager]=useState(false);
  const[showLogin,setShowLogin]=useState(false);
  const[tab,setTab]=useState("schedule");
  return(
    <div style={{minHeight:"100vh",background:"#f8fafc"}}>
      <div style={{background:"#1e293b",color:"#fff",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 8px #0003"}}>
        <div>
          <div style={{fontWeight:700,fontSize:18}}>📋 Customer Solutions — Team Hub</div>
          <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>Feb – Mar 2026 · {agents.length} agents · {SUPERVISORS.length} teams</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          {isManager?<button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>setIsManager(false)}>🔒 Lock</button>
          :<button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>setShowLogin(true)}>🔑 Manager Login</button>}
        </div>
      </div>
      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 24px",display:"flex",gap:4,overflowX:"auto"}}>
        <button className={`nav-tab${tab==="overview"?" active":""}`}   onClick={()=>setTab("overview")}>📊 Overview</button>
        <button className={`nav-tab${tab==="schedule"?" active":""}`}   onClick={()=>setTab("schedule")}>📅 Weekly Schedule</button>
        <button className={`nav-tab${tab==="chat"?" active":""}`}       onClick={()=>setTab("chat")}>💬 Chat Schedule</button>
        <button className={`nav-tab${tab==="timeoff"?" active":""}`}    onClick={()=>setTab("timeoff")}>🏖️ Time Off & PTO</button>
      </div>
      <div style={{padding:"20px 24px"}}>
        {tab==="overview" &&<OverviewTab agents={agents}/>}
        {tab==="schedule" &&<ScheduleTab agents={agents} setAgents={setAgents} isManager={isManager}/>}
        {tab==="chat"     &&<ChatScheduleTab/>}
        {tab==="timeoff"  &&<TimeOffTab agents={agents}/>}
      </div>
      {showLogin&&<LoginModal onLogin={()=>{setIsManager(true);setShowLogin(false);}} onClose={()=>setShowLogin(false)}/>}
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
